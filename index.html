  <style>
    /* ===== Impress Watch トンマナ（ブルー系） ===== */
    :root {
      --iw-navy:      #003399;
      --iw-blue:      #0055cc;
      --iw-blue-mid:  #1a5fb4;
      --iw-blue-light:#e8f0fb;
      --iw-dark:      #1a1a1a;
      --iw-gray:      #555555;
      --iw-light-gray:#f4f6f9;
      --iw-border:    #d0d8e8;
      --iw-link:      #0044bb;
      --iw-link-hover:#cc2200;
      --font-body:    "Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);font-size:14px;line-height:1.7;color:var(--iw-dark);background:#fff}

    /* ===== ヘッダー ===== */
    .site-header{background:var(--iw-navy);border-bottom:3px solid #001f77}
    .site-header__inner{max-width:980px;margin:0 auto;padding:0 12px;display:flex;align-items:center;height:48px;gap:16px}
    .site-header__logo{color:#fff;font-size:19px;font-weight:bold;text-decoration:none;letter-spacing:-0.02em}
    .site-header__logo span{font-size:11px;font-weight:normal;opacity:.8;margin-left:6px}
    .site-header__breadcrumb{color:rgba(255,255,255,.75);font-size:12px}
    .site-header__breadcrumb a{color:rgba(255,255,255,.85);text-decoration:none}
    .site-header__breadcrumb a:hover{color:#fff}

    /* ===== ページヘッダー ===== */
    .page-header{background:var(--iw-blue-light);border-bottom:2px solid var(--iw-navy);padding:18px 0 14px}
    .page-header__inner{max-width:980px;margin:0 auto;padding:0 12px}
    .page-header__title{font-size:22px;font-weight:bold;color:var(--iw-navy);margin-bottom:6px;border-left:4px solid var(--iw-navy);padding-left:10px}
    .page-header__lead{font-size:13px;color:var(--iw-gray);line-height:1.7;padding-left:14px}
    .page-header__updated{font-size:11px;color:#888;margin-top:6px;padding-left:14px}

    /* ===== メインレイアウト ===== */
    .main-wrap{max-width:980px;margin:0 auto;padding:0 12px}

    /* ===== カテゴリナビ ===== */
    .cat-nav{display:flex;gap:4px;flex-wrap:wrap;padding:12px 0 10px;border-bottom:1px solid var(--iw-border);margin-bottom:0}
    .cat-nav__btn{background:#fff;border:1px solid #b0bcd8;border-radius:3px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--iw-dark);transition:all .15s;white-space:nowrap;font-family:inherit}
    .cat-nav__btn:hover{border-color:var(--iw-blue);color:var(--iw-blue);background:var(--iw-blue-light)}
    .cat-nav__btn.active{background:var(--iw-navy);border-color:var(--iw-navy);color:#fff}

    /* ===== カテゴリセクション ===== */
    .category-section{margin:24px 0 0}
    .category-section__heading{font-size:15px;font-weight:bold;color:#fff;background:var(--iw-navy);padding:7px 14px;border-radius:3px 3px 0 0;display:flex;align-items:center;gap:8px}
    .category-section__heading::before{content:'';display:inline-block;width:3px;height:16px;background:rgba(255,255,255,.5);border-radius:2px}

    /* ===== サービス一覧テーブル ===== */
    .service-table{width:100%;border-collapse:collapse;border:1px solid var(--iw-border);border-top:none;margin-bottom:4px;background:#fff}
    .service-table th{background:#dce6f5;font-size:12px;color:var(--iw-gray);font-weight:normal;padding:6px 10px;text-align:left;border-bottom:1px solid var(--iw-border);border-right:1px solid var(--iw-border)}
    .service-table td{padding:10px 10px;border-bottom:1px solid var(--iw-border);border-right:1px solid var(--iw-border);vertical-align:middle}
    .service-table tr:last-child td{border-bottom:none}
    .service-table tr:hover td{background:var(--iw-blue-light)}
    .col-service{width:22%}.col-plans{width:60%}.col-action{width:18%}

    .service-name{font-weight:bold;font-size:16px;color:var(--iw-dark)}
    .service-provider{font-size:11px;color:#888;margin-top:2px}

    .price-row{display:flex;align-items:baseline;flex-wrap:wrap;gap:2px 12px;margin-bottom:2px}
    .price-label{color:var(--iw-gray);font-size:13px;min-width:0}
    .price-label.large{font-size:16px;color:var(--iw-dark)}
    .price-amount{font-weight:bold;font-size:16px;color:var(--iw-dark)}
    .price-amount.usd{color:#1a6e40}
    .price-unit{color:var(--iw-gray);font-size:12px}

    .badge-history{display:inline-block;font-size:10px;background:#fff8dc;border:1px solid #c8a000;color:#7a5c00;border-radius:2px;padding:1px 5px;margin-left:4px;vertical-align:middle;white-space:nowrap}

.btn-detail{display:inline-block;background:var(--iw-blue);color:#fff;text-decoration:none;font-size:12px;padding:5px 12px;border-radius:3px;border:none;cursor:pointer;transition:background .15s;font-family:inherit}

    /* ===== モーダル ===== */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;overflow-y:auto}
    .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 12px}
    .modal{background:#fff;width:100%;max-width:720px;border-radius:4px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,64,.3);animation:slideIn .18s ease}
    @keyframes slideIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}

    .modal-header{background:var(--iw-navy);color:#fff;padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .modal-header__title{font-size:18px;font-weight:bold;line-height:1.3}
    .modal-header__sub{font-size:12px;opacity:.75;margin-top:3px}
    .modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;opacity:.75;flex-shrink:0;line-height:1;font-family:inherit}
    .modal-close:hover{opacity:1}

    .modal-body{padding:20px}

    .modal-sec-title{font-size:13px;font-weight:bold;color:#fff;background:var(--iw-blue-mid);padding:5px 12px;margin:18px 0 12px;border-radius:2px}
    .modal-sec-title:first-child{margin-top:0}

    .modal-desc{font-size:13px;line-height:1.85;color:#333;margin-bottom:8px}
    .modal-url{font-size:12px;margin-top:6px}
    .modal-url a{color:var(--iw-link);text-decoration:none}
    .modal-url a:hover{text-decoration:underline;color:var(--iw-link-hover)}

    /* 価格履歴テーブル */
    .plan-block{margin-bottom:20px}
    .plan-name{font-size:13px;font-weight:bold;color:var(--iw-navy);padding:5px 10px;background:var(--iw-blue-light);border-left:3px solid var(--iw-navy);margin-bottom:6px}
    .plan-desc{font-size:12px;color:var(--iw-gray)}

    .history-table{width:100%;border-collapse:collapse;font-size:13px}
    .history-table th{background:#dce6f5;padding:6px 10px;text-align:left;font-weight:normal;font-size:12px;color:var(--iw-gray);border:1px solid var(--iw-border)}
    .history-table td{padding:8px 10px;border:1px solid var(--iw-border);vertical-align:middle}
    .history-table tr.current td{background:#fffbe6;font-weight:bold}

    .badge-current{display:inline-block;background:var(--iw-navy);color:#fff;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:5px;font-weight:normal;vertical-align:middle}
    .badge-up{display:inline-block;background:#fde8e8;border:1px solid #c44;color:#900;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:4px;font-weight:normal;vertical-align:middle}
    .badge-down{display:inline-block;background:#e8fde8;border:1px solid #4a4;color:#060;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:4px;font-weight:normal;vertical-align:middle}
    .source-link{font-size:11px;color:#aaa}
    .source-link a{color:var(--iw-link);text-decoration:none}
    .source-link a:hover{text-decoration:underline}

    /* ===== フッター ===== */
    .site-footer{background:#1a1a2e;color:#aaa;text-align:center;font-size:11px;padding:20px 12px;margin-top:40px}
    .site-footer__note{margin-top:8px;font-size:11px;color:#666}

    /* ===== ツールバー（検索・ソート） ===== */
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--iw-border);background:#fafbfd}
    .toolbar__group{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--iw-gray)}
    .toolbar__input{font-family:inherit;font-size:13px;padding:5px 10px;border:1px solid #b0bcd8;border-radius:3px;min-width:180px;background:#fff;color:var(--iw-dark)}
    .toolbar__input:focus{outline:none;border-color:var(--iw-blue);box-shadow:0 0 0 2px rgba(0,85,204,.15)}
    .toolbar__select{font-family:inherit;font-size:12px;padding:4px 8px;border:1px solid #b0bcd8;border-radius:3px;background:#fff;color:var(--iw-dark);cursor:pointer}
    .toolbar__count{margin-left:auto;font-size:11px;color:#888}

    /* ===== 価格ミニグラフ（モーダル内） ===== */
    .price-chart{margin:8px 0 14px;padding:8px 10px;background:#fafbfd;border:1px solid var(--iw-border);border-radius:3px}
    .price-chart__svg{width:100%;height:60px;display:block}
    .price-chart__line{fill:none;stroke:var(--iw-blue);stroke-width:2}
    .price-chart__dot{fill:var(--iw-navy)}
    .price-chart__label{font-size:9px;fill:var(--iw-gray);font-family:var(--font-body)}
    .price-chart__amount{font-size:10px;fill:var(--iw-navy);font-family:var(--font-body);font-weight:bold}
    .price-chart__caption{font-size:10px;color:#888;text-align:right;margin-top:2px}

    /* ===== 年額換算表示 ===== */
    .price-annual{font-size:10px;color:#888;margin-left:6px}

    /* ===== アクセシビリティ ===== */
    *:focus-visible{outline:2px solid var(--iw-blue);outline-offset:2px}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* ===== レスポンシブ ===== */
    @media(max-width:768px){
      .service-table .col-updated{display:none}
      .service-table .col-action{width:24%}
      .service-table th,.service-table td{padding:8px 6px;font-size:12px}
      .price-amount{font-size:13px}
      .modal-overlay.open{padding:0;align-items:flex-end}
      .modal{border-radius:8px 8px 0 0;max-height:92vh;overflow-y:auto;max-width:100%}
      .modal-body{padding:14px}
      .history-table{font-size:11px}
      .history-table th,.history-table td{padding:5px 6px}
      .toolbar{flex-direction:column;align-items:stretch}
      .toolbar__input{min-width:0;width:100%}
      .toolbar__count{margin-left:0;text-align:right}
      .cat-nav{padding:8px 0 6px;gap:3px}
      .cat-nav__btn{padding:3px 8px;font-size:11px}
      .page-header__title{font-size:18px}
      .site-header{height:auto}
      .site-header__inner{flex-wrap:wrap;height:auto;padding:8px 12px}
    }

    /* ===== 印刷用 ===== */
    @media print{
      body{font-size:11pt;color:#000;background:#fff}
      .site-header,.cat-nav,.toolbar,.btn-detail,.modal-overlay,.site-footer{display:none !important}
      .page-header{background:none;border-bottom:2px solid #000;padding:8px 0}
      .page-header__title{color:#000;border:none;padding:0;font-size:16pt}
      .page-header__lead{color:#333;padding:0;font-size:10pt;margin-top:4px}
      .category-section__heading{background:#000;color:#fff;font-size:11pt;page-break-after:avoid}
      .service-table{font-size:9pt;page-break-inside:avoid}
      .service-table tr:hover td{background:none}
      .service-table th{background:#eee;color:#000}
      .col-action{display:none}
      .col-service{width:30%}.col-plans{width:70%}
      .badge-history{display:none}
      .main-wrap{max-width:100%;padding:0}
      a{color:#000;text-decoration:none}
      .price-amount.usd{color:#000}
    }

    /* ===== アニメーション抑制（ユーザー設定優先） ===== */
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important}
    }
  </style>
</head>

<div class="page-header">

    <p class="page-header__lead">主要テクノロジー系サブスクリプションサービスの現在価格と価格改定履歴をまとめています。<br>価格は税込・月額を基本とし、ドル建てサービスはUSドル(税別)表記です。</p>
  </div>
</div>

<div class="main-wrap">
  <nav class="cat-nav" id="catNav" aria-label="カテゴリ"></nav>
  <div class="toolbar" role="search">
    <label class="sr-only" for="searchInput">サービス検索</label>
    <input type="search" id="searchInput" class="toolbar__input" placeholder="🔍 サービス名・提供元で検索…" aria-label="サービス検索">
    <div class="toolbar__group">
      <label for="sortSelect">並び順:</label>
      <select id="sortSelect" class="toolbar__select" aria-label="並び順">
        <option value="default">カテゴリ順</option>
        <option value="name">サービス名(あいうえお)</option>
        <option value="price-asc">価格が安い順</option>
        <option value="price-desc">価格が高い順</option>
      </select>
    </div>
    <div class="toolbar__group">
      <label for="historyFilter">表示:</label>
      <select id="historyFilter" class="toolbar__select" aria-label="フィルタ">
        <option value="all">すべて</option>
        <option value="history">改定履歴ありのみ</option>
      </select>
    </div>
    <div class="toolbar__count" id="resultCount"></div>
  </div>

<script>
// ===== データはdata/db.jsonから読み込み =====
let DB = null;

// ===== ユーティリティ =====
let categoryMap = {};

function getCurrentPrice(plan){
  const active=plan.price_history.filter(p=>p.valid_to===null);
  if(!active.length)return null;
  return active.reduce((a,b)=>a.valid_from>=b.valid_from?a:b);
}

function fmtAmount(p){
  if(p.currency==='JPY') return p.amount.toLocaleString()+'円';
  return p.amount+' USドル';
}

function fmtBilling(b){
  return b==='monthly'?'/月':b==='annual'?'/年':'';
}

function fmtTax(p){
  if(p.currency==='USD') return '(税別)';
  return p.tax_included ? '' : '(税別)';
}

function hasHistoryEntry(plan){
  return plan.price_history.some(p=>p.valid_to!==null);
}

function fmtYM(str){
  if(!str) return '現在';
  const d=new Date(str);
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月';
}

// ===== 追加ユーティリティ =====
// USD->JPYざっくり換算（年額換算の比較用、TODO: 為替レートは編集部で確認）
const USD_TO_JPY = 150;
function toJpyAnnual(p){
  if(!p) return 0;
  let monthly = p.currency==='USD' ? p.amount*USD_TO_JPY : p.amount;
  return p.billing==='annual' ? p.amount * (p.currency==='USD'?USD_TO_JPY:1) : monthly*12;
}
function fmtAnnual(p){
  if(!p||p.amount===0) return '';
  const yearly = toJpyAnnual(p);
  const text = '年' + yearly.toLocaleString() + '円相当';
  return `<span class="price-annual">(${text})</span>`;
}
function getMinCurrentPrice(svc){
  // ソート用：そのサービスの最安現在価格（年額換算）
  let min = Infinity;
  svc.plans.forEach(plan=>{
    const cur=getCurrentPrice(plan);
    if(cur && cur.amount > 0){
      const y = toJpyAnnual(cur);
      if(y < min) min = y;
    }
  });
  return min === Infinity ? 0 : min;
}
function svcHasHistory(svc){
  return svc.plans.some(p=>hasHistoryEntry(p));
}
function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== ステート =====
const state = {
  category: 'all',
  search: '',
  sort: 'default',
  historyFilter: 'all'
};

// ===== カテゴリナビ =====
const catNav=document.getElementById('catNav');
function buildCatNav(){
  [{id:'all',name:'すべて'},...DB.categories].forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='cat-nav__btn'+(i===0?' active':'');
    btn.textContent=cat.name;
    btn.dataset.cat=cat.id;
    btn.setAttribute('aria-pressed', i===0?'true':'false');
    catNav.appendChild(btn);
  });
}
catNav.addEventListener('click',e=>{
  const btn=e.target.closest('.cat-nav__btn');
  if(!btn)return;
  document.querySelectorAll('.cat-nav__btn').forEach(b=>{
    b.classList.remove('active');
    b.setAttribute('aria-pressed','false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-pressed','true');
  state.category = btn.dataset.cat;
  renderList();
});

// ===== ツールバー =====
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');
const historyFilter = document.getElementById('historyFilter');
let searchTimer;
searchInput.addEventListener('input', e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    state.search = e.target.value.trim().toLowerCase();
    renderList();
  }, 120);
});
sortSelect.addEventListener('change', e=>{ state.sort = e.target.value; renderList(); });
historyFilter.addEventListener('change', e=>{ state.historyFilter = e.target.value; renderList(); });

// ===== 一覧レンダリング =====
function filterServices(){
  let services = DB.services.slice();
  if(state.category !== 'all') services = services.filter(s=>(s.categories||[]).includes(state.category));
  if(state.search){
    services = services.filter(s=>
      s.name.toLowerCase().includes(state.search) ||
      s.provider.toLowerCase().includes(state.search)
    );
  }
  if(state.historyFilter === 'history') services = services.filter(svcHasHistory);
  return services;
}

function renderList(){
  const container=document.getElementById('serviceList');
  container.innerHTML='';
  const services = filterServices();
  document.getElementById('resultCount').textContent = `${services.length} サービス`;

  if(!services.length){
    container.innerHTML = '<div style="padding:40px 12px;text-align:center;color:#888;font-size:13px">該当するサービスがありません。</div>';
    return;
  }

  // ソート処理
  if(state.sort !== 'default'){
    if(state.sort === 'name') services.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
    else if(state.sort === 'price-asc') services.sort((a,b)=>getMinCurrentPrice(a)-getMinCurrentPrice(b));
    else if(state.sort === 'price-desc') services.sort((a,b)=>getMinCurrentPrice(b)-getMinCurrentPrice(a));
    // ソート時はカテゴリでグループ分けせずフラットなリストに
    renderFlat(container, services);
    return;
  }

  // カテゴリ別表示
  const cats = state.category==='all' ? DB.categories : DB.categories.filter(c=>c.id===state.category);
  cats.forEach(cat=>{
    const catServices = services.filter(s=>(s.categories||[]).includes(cat.id));
    if(!catServices.length)return;

    const section=document.createElement('section');
    section.className='category-section';
    section.setAttribute('aria-labelledby', 'cat-'+cat.id);

    const heading=document.createElement('h2');
    heading.id = 'cat-'+cat.id;
    heading.className='category-section__heading';
    heading.textContent=cat.name;
    section.appendChild(heading);

    section.appendChild(buildTable(catServices));
    container.appendChild(section);
  });
}

function renderFlat(container, services){
  const section=document.createElement('section');
  section.className='category-section';
  const heading=document.createElement('h2');
  heading.className='category-section__heading';
  heading.textContent = '検索・ソート結果';
  section.appendChild(heading);
  section.appendChild(buildTable(services, true));
  container.appendChild(section);
}

function buildTable(services, showCat){
  const table=document.createElement('table');
  table.className='service-table';
  table.setAttribute('aria-label','サービス一覧');
  table.innerHTML=`<colgroup><col class="col-service"><col class="col-plans"><col class="col-action"></colgroup>
    <thead><tr>
      <th scope="col">サービス名</th><th scope="col">プラン・価格</th><th scope="col"><span class="sr-only">操作</span></th>
    </tr></thead><tbody></tbody>`;

  const tbody=table.querySelector('tbody');
  services.forEach(svc=>{
    const tr=document.createElement('tr');
    const bigLabel=(svc.categories||[]).some(c=>c==='ai'||c==='cloud-storage');
    const priceHtml=svc.plans.map(plan=>{
      const cur=getCurrentPrice(plan);
      if(!cur)return '';
      const isUSD=cur.currency==='USD';
      const taxNote=fmtTax(cur);
      const annualHtml = (cur.amount>0) ? fmtAnnual(cur) : '';
      return `<div class="price-row">
        <span class="price-label${bigLabel?' large':''}">${escapeHtml(plan.name)}</span>
        <span class="price-amount${isUSD?' usd':''}">${fmtAmount(cur)}</span>
        ${taxNote?`<span class="price-unit">${taxNote}</span>`:''}
        <span class="price-unit">${fmtBilling(cur.billing)}</span>
        ${annualHtml}
      </div>`;
    }).join('');

    const catLabel = showCat ? `<div class="service-provider">${escapeHtml((svc.categories||[]).map(id=>categoryMap[id]).filter(Boolean).join(' / '))}</div>` : '';
    tr.innerHTML=`
      <td><div class="service-name">${escapeHtml(svc.name)}</div><div class="service-provider">${escapeHtml(svc.provider)}</div>${catLabel}</td>
      <td>${priceHtml}</td>
      <td><button class="btn-detail" data-id="${svc.id}" aria-label="${escapeHtml(svc.name)}の詳細と価格推移を見る">詳細・推移 ›</button></td>`;
    tbody.appendChild(tr);
  });
  return table;
}

// ===== 価格推移ミニグラフ =====
function buildPriceChart(plan){
  const history = [...plan.price_history].sort((a,b)=>new Date(a.valid_from)-new Date(b.valid_from));
  if(history.length < 2) return '';
  const W = 600, H = 60, PAD_L = 50, PAD_R = 80, PAD_T = 12, PAD_B = 18;
  const innerW = W - PAD_L - PAD_R, innerH = H - PAD_T - PAD_B;
  const amounts = history.map(h=>h.amount);
  const minA = Math.min(...amounts), maxA = Math.max(...amounts);
  const range = maxA - minA || 1;
  const dates = history.map(h=>new Date(h.valid_from).getTime());
  const minD = dates[0], maxD = dates[dates.length-1];
  const dRange = maxD - minD || 1;
  const points = history.map((h,i)=>{
    const x = PAD_L + ((dates[i]-minD)/dRange)*innerW;
    const y = PAD_T + innerH - ((h.amount-minA)/range)*innerH;
    return {x, y, h};
  });
  // 現在価格も追加（線の終点）
  const last = history[history.length-1];
  if(last.valid_to !== null){
    // 履歴上の最終エントリが過去のもの＝現在価格が別なら追加しない（このケースは稀）
  }
  const pathD = points.map((p,i)=>(i===0?'M':'L')+p.x+','+p.y).join('');
  const labelStart = fmtYM(history[0].valid_from);
  const labelEnd = history[history.length-1].valid_to === null ? '現在' : fmtYM(history[history.length-1].valid_to);
  const unit = history[0].currency === 'USD' ? '$' : '¥';
  const currentAmt = unit + last.amount.toLocaleString();
  return `<div class="price-chart">
    <svg class="price-chart__svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="価格推移グラフ">
      <text x="0" y="${PAD_T+4}" class="price-chart__amount">${unit}${maxA.toLocaleString()}</text>
      <text x="0" y="${H-PAD_B+12}" class="price-chart__amount">${unit}${minA.toLocaleString()}</text>
      <path class="price-chart__line" d="${pathD}"/>
      ${points.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" class="price-chart__dot"><title>${fmtYM(p.h.valid_from)}: ${unit}${p.h.amount.toLocaleString()}</title></circle>`).join('')}
      <text x="${PAD_L}" y="${H-2}" class="price-chart__label">${labelStart}</text>
      <text x="${W-PAD_R}" y="${H-2}" class="price-chart__label">${labelEnd}</text>
      <text x="${W-PAD_R+8}" y="${points[points.length-1].y+4}" class="price-chart__amount">${currentAmt}</text>
    </svg>
  </div>`;
}

// ===== モーダル =====
const overlay=document.getElementById('modalOverlay');

document.getElementById('serviceList').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-detail');
  if(btn) openModal(btn.dataset.id);
});
overlay.addEventListener('click',e=>{ if(e.target===overlay)closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

function openModal(id){
  const svc=DB.services.find(s=>s.id===id);
  if(!svc)return;

  let plansHtml='';
  svc.plans.forEach(plan=>{
    const sorted=[...plan.price_history].sort((a,b)=>new Date(b.valid_from)-new Date(a.valid_from));
    const rows=sorted.map((h,idx)=>{
      const isCur=h.valid_to===null;
      const period=isCur?`${fmtYM(h.valid_from)} 〜 現在`:`${fmtYM(h.valid_from)} 〜 ${fmtYM(h.valid_to)}`;
      const next=sorted[idx+1];
      let changeBadge='';
      if(next){
        if(h.amount>next.amount) changeBadge='<span class="badge-up">値上げ</span>';
        else if(h.amount<next.amount) changeBadge='<span class="badge-down">値下げ</span>';
      }
      const taxNote=fmtTax(h);
      const srcHtml=h.source?`<span class="source-link">(<a href="${h.source}" target="_blank" rel="noopener">出典</a>)</span>`:'';
      return `<tr class="${isCur?'current':''}">
        <td>${period}</td>
        <td>${fmtAmount(h)}${taxNote}${fmtBilling(h.billing)}${isCur?'<span class="badge-current">現在</span>':''}${changeBadge}</td>
        <td>${h.note||'—'} ${srcHtml}</td>
      </tr>`;
    }).join('');

    const nameDesc=plan.name+(plan.description?' — '+plan.description:'');
    const chart = buildPriceChart(plan);
    plansHtml+=`<div class="plan-block">
      <div class="plan-name">${escapeHtml(nameDesc)}</div>
      ${chart}
      <table class="history-table">
        <thead><tr>
          <th scope="col" style="width:32%">適用期間</th>
          <th scope="col" style="width:32%">価格</th>
          <th scope="col" style="width:36%">備考</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header">
      <div>
        <div class="modal-header__title">${escapeHtml(svc.name)}</div>
        <div class="modal-header__sub">${escapeHtml(svc.provider)} &mdash; ${escapeHtml((svc.categories||[]).map(id=>categoryMap[id]).filter(Boolean).join(' / '))}</div>
      </div>
      <button class="modal-close" id="modalCloseBtn" aria-label="閉じる">&times;</button>
    </div>
    <div class="modal-body">
      <p class="modal-sec-title">サービス概要</p>
      <p class="modal-desc">${escapeHtml(svc.description).replace(/\n/g,'<br>')}</p>
      <p class="modal-url">公式サイト：<a href="${escapeHtml(svc.url)}" target="_blank" rel="noopener">${escapeHtml(svc.url_label)} ↗</a></p>
      <p class="modal-sec-title">価格一覧・改定履歴</p>
      ${plansHtml}
    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  const closeBtn = document.getElementById('modalCloseBtn');
  closeBtn.addEventListener('click',closeModal);
  closeBtn.focus();
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
}

// ===== 起動：データ読み込み =====
fetch('data/db.json')
  .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
  .then(db=>{
    DB = db;
    categoryMap = Object.fromEntries(DB.categories.map(c=>[c.id,c.name]));
    buildCatNav();
    renderList();
  })
  .catch(err=>{
    document.getElementById('serviceList').innerHTML =
      '<div style="padding:40px 12px;text-align:center;color:#c00;font-size:13px">データの読み込みに失敗しました（'+escapeHtml(err.message)+'）。HTTPサーバー経由で開いてください。</div>';
  });
</script>
