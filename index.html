<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サブスク料金ナビ — Impress Watch</title>
  <meta name="description" content="Apple One・Google One・Netflix・Spotify・ChatGPT・Claudeなど、主要なテック系サブスクリプションサービスの現在価格と過去の価格改定履歴を一覧で確認できます。">
  <meta name="keywords" content="サブスクリプション,価格,料金,比較,Apple One,Google One,Netflix,Spotify,ChatGPT,Claude,価格改定">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#003399">
  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Impress Watch">
  <meta property="og:title" content="サブスク料金ナビ — Impress Watch">
  <meta property="og:description" content="主要テック系サブスクリプションの現在価格と価格改定履歴を一覧で確認。Apple One, Google One, Netflix, Spotify, ChatGPT, Claude などを網羅。">
  <meta property="og:locale" content="ja_JP">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="サブスク料金ナビ — Impress Watch">
  <meta name="twitter:description" content="主要テック系サブスクリプションの現在価格と価格改定履歴を一覧で確認。">
  <style>
    /* ===== Impress Watch トンマナ（ブルー系） ===== */
    :root {
      --iw-navy:      #003399;
      --iw-blue:      #0055cc;
      --iw-blue-mid:  #1a5fb4;
      --iw-blue-light:#e8f0fb;
      --iw-dark:      #1a1a1a;
      --iw-gray:      #555555;
      --iw-light-gray:#f4f6f9;
      --iw-border:    #d0d8e8;
      --iw-link:      #0044bb;
      --iw-link-hover:#cc2200;
      --font-body:    "Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);font-size:14px;line-height:1.7;color:var(--iw-dark);background:#fff}

    /* ===== ヘッダー ===== */
    .site-header{background:var(--iw-navy);border-bottom:3px solid #001f77}
    .site-header__inner{max-width:980px;margin:0 auto;padding:0 12px;display:flex;align-items:center;height:48px;gap:16px}
    .site-header__logo{color:#fff;font-size:19px;font-weight:bold;text-decoration:none;letter-spacing:-0.02em}
    .site-header__logo span{font-size:11px;font-weight:normal;opacity:.8;margin-left:6px}
    .site-header__breadcrumb{color:rgba(255,255,255,.75);font-size:12px}
    .site-header__breadcrumb a{color:rgba(255,255,255,.85);text-decoration:none}
    .site-header__breadcrumb a:hover{color:#fff}

    /* ===== ページヘッダー ===== */
    .page-header{background:var(--iw-blue-light);border-bottom:2px solid var(--iw-navy);padding:18px 0 14px}
    .page-header__inner{max-width:980px;margin:0 auto;padding:0 12px}
    .page-header__title{font-size:22px;font-weight:bold;color:var(--iw-navy);margin-bottom:6px;border-left:4px solid var(--iw-navy);padding-left:10px}
    .page-header__meta{display:flex;align-items:center;gap:16px;padding-left:14px;margin-top:2px}
    .page-header__updated{font-size:11px;color:#888}
    .about-toggle{background:none;border:none;color:var(--iw-link);font-size:12px;cursor:pointer;padding:0;font-family:inherit}
    .about-toggle:hover{text-decoration:underline;color:var(--iw-link-hover)}
    .page-header__lead{font-size:13px;color:var(--iw-gray);line-height:1.7;margin:10px 0 0 14px;padding:10px 34px 10px 12px;background:#fff;border:1px solid var(--iw-border);border-radius:3px;position:relative}
    .page-header__lead[hidden]{display:none}
    .about-close{position:absolute;top:4px;right:6px;background:none;border:none;font-size:18px;color:#999;cursor:pointer;line-height:1;padding:2px 4px;font-family:inherit}
    .about-close:hover{color:var(--iw-dark)}

    /* ===== メインレイアウト ===== */
    .main-wrap{max-width:980px;margin:0 auto;padding:0 12px}

    /* ===== 合計シミュレーター ===== */
    .sim-check{width:16px;height:16px;accent-color:var(--iw-navy);margin-right:2px;cursor:pointer;flex-shrink:0;align-self:center}
    body:not(.sim-mode) .sim-check{display:none}
    .sim-bar{position:fixed;left:0;right:0;bottom:0;background:var(--iw-navy);color:#fff;z-index:90;box-shadow:0 -2px 10px rgba(0,0,64,.35);display:none}
    .sim-bar.show{display:block}
    .sim-bar__inner{max-width:980px;margin:0 auto;padding:10px 12px;display:flex;align-items:center;gap:8px 14px;flex-wrap:wrap;font-size:13px}
    .sim-bar__total{font-size:16px;font-weight:bold}
    .sim-bar__total small{font-weight:normal;font-size:12px;opacity:.85}
    .sim-bar__btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:12px;padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;white-space:nowrap}
    .sim-bar__btn:hover{background:rgba(255,255,255,.28)}
    .sim-chip{background:rgba(255,255,255,.12);border-radius:10px;padding:1px 8px;font-size:11px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
    .sim-chip button{background:none;border:none;color:#fff;cursor:pointer;font-size:12px;padding:0;line-height:1}
    body.sim-open{padding-bottom:72px}

    /* ===== 改定ニュース欄 ===== */
    .news-box{margin:14px 0 2px;border:1px solid var(--iw-border);border-radius:3px;background:#fff;overflow:hidden}
    .news-box__head{display:block;width:100%;text-align:left;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:bold;color:var(--iw-navy);padding:7px 12px;border-bottom:1px solid var(--iw-border);background:var(--iw-blue-light)}
    .news-box.collapsed .news-box__head{background:#fff;border-bottom:none;font-weight:normal;color:var(--iw-gray);font-size:12px;padding:5px 12px}
    .news-box.collapsed .news-box__head:hover{color:var(--iw-blue)}
    .news-box.collapsed ul{display:none}
    .news-arrow{font-size:10px;margin-left:6px}
    .news-count{display:inline-block;background:var(--iw-navy);color:#fff;font-size:10px;border-radius:8px;padding:0 7px;margin-left:6px;font-weight:normal;vertical-align:middle}
    .news-box.collapsed .news-count{background:#8896b8}
    .news-box ul{list-style:none;margin:0;padding:2px 0}
    .news-box li{display:flex;align-items:baseline;gap:8px;padding:6px 12px;font-size:13px;border-bottom:1px dashed #e4e9f4;flex-wrap:wrap}
    .news-box li:last-child{border-bottom:none}
    .news-date{color:#888;font-size:11px;white-space:nowrap;min-width:64px}
    .badge-new{display:inline-block;background:#e8f0fb;border:1px solid var(--iw-blue);color:var(--iw-blue);font-size:10px;border-radius:2px;padding:1px 5px;font-weight:normal;vertical-align:middle;white-space:nowrap}
    .news-link{color:var(--iw-link);cursor:pointer;text-decoration:none;font-weight:bold}
    .news-link:hover{text-decoration:underline;color:var(--iw-link-hover)}

    /* ===== カテゴリナビ ===== */
    .cat-nav{display:flex;gap:4px;flex-wrap:wrap;padding:12px 0 10px;border-bottom:1px solid var(--iw-border);margin-bottom:0}
    .cat-nav__btn{background:#fff;border:1px solid #b0bcd8;border-radius:3px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--iw-dark);transition:all .15s;white-space:nowrap;font-family:inherit}
    .cat-nav__btn:hover{border-color:var(--iw-blue);color:var(--iw-blue);background:var(--iw-blue-light)}
    .cat-nav__btn.active{background:var(--iw-navy);border-color:var(--iw-navy);color:#fff}

    /* ===== カテゴリセクション ===== */
    .category-section{margin:24px 0 0}
    .category-section__heading{font-size:15px;font-weight:bold;color:#fff;background:var(--iw-navy);padding:7px 14px;border-radius:3px 3px 0 0;display:flex;align-items:center;gap:8px}
    .category-section__heading::before{content:'';display:inline-block;width:3px;height:16px;background:rgba(255,255,255,.5);border-radius:2px}

    /* ===== サービス一覧テーブル ===== */
    .service-table{width:100%;border-collapse:collapse;border:1px solid var(--iw-border);border-top:none;margin-bottom:4px;background:#fff}
    .service-table th{background:#dce6f5;font-size:12px;color:var(--iw-gray);font-weight:normal;padding:6px 10px;text-align:left;border-bottom:1px solid var(--iw-border);border-right:1px solid var(--iw-border)}
    .service-table td{padding:10px 10px;border-bottom:1px solid var(--iw-border);border-right:1px solid var(--iw-border);vertical-align:middle}
    .service-table tr:last-child td{border-bottom:none}
    .service-table tr:hover td{background:var(--iw-blue-light)}
    .col-service{width:22%}.col-plans{width:60%}.col-action{width:18%}

    .service-name{font-weight:bold;font-size:17px;color:var(--iw-dark)}
    .service-provider{font-size:11px;color:#888;margin-top:2px}

    .price-row{display:flex;align-items:baseline;flex-wrap:wrap;gap:2px 12px;margin-bottom:2px}
    .price-label{color:var(--iw-gray);font-size:15px;min-width:0}
    .price-label.large{font-size:16px;color:var(--iw-dark)}
    .price-amount{font-weight:bold;font-size:16px;color:var(--iw-dark)}
    .price-unit{color:var(--iw-gray);font-size:12px}

    .badge-history{display:inline-block;font-size:10px;background:#fff8dc;border:1px solid #c8a000;color:#7a5c00;border-radius:2px;padding:1px 5px;margin-left:4px;vertical-align:middle;white-space:nowrap}

.btn-detail{display:inline-block;background:var(--iw-blue);color:#fff;text-decoration:none;font-size:12px;padding:5px 12px;border-radius:3px;border:none;cursor:pointer;transition:background .15s;font-family:inherit}
    .btn-detail:hover{background:var(--iw-navy)}

    /* ===== モーダル ===== */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;overflow-y:auto}
    .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 12px}
    .modal{background:#fff;width:100%;max-width:720px;border-radius:4px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,64,.3);animation:slideIn .18s ease}
    @keyframes slideIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}

    .modal-header{background:var(--iw-navy);color:#fff;padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .modal-header__title{font-size:18px;font-weight:bold;line-height:1.3}
    .modal-header__sub{font-size:12px;opacity:.75;margin-top:3px}
    .modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;opacity:.75;flex-shrink:0;line-height:1;font-family:inherit}
    .modal-close:hover{opacity:1}

    .modal-body{padding:20px}

    .modal-sec-title{font-size:13px;font-weight:bold;color:#fff;background:var(--iw-blue-mid);padding:5px 12px;margin:18px 0 12px;border-radius:2px}
    .modal-sec-title:first-child{margin-top:0}

    .modal-desc{font-size:13px;line-height:1.85;color:#333;margin-bottom:8px}
    .modal-url{font-size:12px;margin-top:6px}
    .modal-url a{color:var(--iw-link);text-decoration:none}
    .modal-url a:hover{text-decoration:underline;color:var(--iw-link-hover)}

    /* 価格履歴テーブル */
    .plan-block{margin-bottom:20px}
    .plan-name{font-size:13px;font-weight:bold;color:var(--iw-navy);padding:5px 10px;background:var(--iw-blue-light);border-left:3px solid var(--iw-navy);margin-bottom:6px}
    .plan-annual{font-size:11px;color:#888;margin:-2px 0 8px;padding-left:2px}
    .plan-desc{font-size:12px;color:var(--iw-gray)}

    .history-table{width:100%;border-collapse:collapse;font-size:13px}
    .history-table th{background:#dce6f5;padding:6px 10px;text-align:left;font-weight:normal;font-size:12px;color:var(--iw-gray);border:1px solid var(--iw-border)}
    .history-table td{padding:8px 10px;border:1px solid var(--iw-border);vertical-align:middle}
    .history-table tr.current td{background:#fffbe6;font-weight:bold}

    .badge-current{display:inline-block;background:var(--iw-navy);color:#fff;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:5px;font-weight:normal;vertical-align:middle}
    .badge-up{display:inline-block;background:#fde8e8;border:1px solid #c44;color:#900;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:4px;font-weight:normal;vertical-align:middle}
    .badge-down{display:inline-block;background:#e8fde8;border:1px solid #4a4;color:#060;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:4px;font-weight:normal;vertical-align:middle}
    .source-link{font-size:11px;color:#aaa}
    .source-link a{color:var(--iw-link);text-decoration:none}
    .source-link a:hover{text-decoration:underline}

    /* ===== フッター ===== */
    .site-footer{background:#1a1a2e;color:#aaa;text-align:center;font-size:11px;padding:20px 12px;margin-top:40px}
    .site-footer__note{margin-top:8px;font-size:11px;color:#666}

    /* ===== ツールバー（検索・ソート） ===== */
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--iw-border);background:#fafbfd}
    .toolbar__group{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--iw-gray)}
    .toolbar__input{font-family:inherit;font-size:13px;padding:5px 10px;border:1px solid #b0bcd8;border-radius:3px;min-width:180px;background:#fff;color:var(--iw-dark)}
    .toolbar__input:focus{outline:none;border-color:var(--iw-blue);box-shadow:0 0 0 2px rgba(0,85,204,.15)}
    .toolbar__select{font-family:inherit;font-size:12px;padding:4px 8px;border:1px solid #b0bcd8;border-radius:3px;background:#fff;color:var(--iw-dark);cursor:pointer}
    .toolbar__count{margin-left:auto;font-size:11px;color:#888}
    .toolbar__filter-btn{font-family:inherit;font-size:12px;padding:5px 12px;border:1px solid #b0bcd8;border-radius:3px;background:#fff;color:var(--iw-dark);cursor:pointer;white-space:nowrap}
    .toolbar__filter-btn[data-tip]{position:relative}
    .toolbar__filter-btn[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:0;top:calc(100% + 6px);z-index:60;background:var(--iw-dark);color:#fff;font-size:11px;line-height:1.6;padding:7px 10px;border-radius:3px;width:max-content;max-width:280px;white-space:normal;text-align:left;box-shadow:0 2px 10px rgba(0,0,0,.3);pointer-events:none}
    .toolbar__filter-btn:hover{border-color:var(--iw-blue);color:var(--iw-blue)}
    .toolbar__filter-btn.active{background:var(--iw-blue-light);border-color:var(--iw-blue);color:var(--iw-blue)}
    .toolbar__options{flex-basis:100%;display:flex;gap:14px;flex-wrap:wrap;padding:2px 0}
    .toolbar__options[hidden]{display:none}

    /* ===== 価格ミニグラフ（モーダル内） ===== */
    .price-chart{margin:8px 0 14px;padding:8px 10px;background:#fafbfd;border:1px solid var(--iw-border);border-radius:3px}
    .price-chart__svg{width:100%;height:auto;display:block}
    .price-chart__line{fill:none;stroke:var(--iw-blue);stroke-width:2;stroke-linejoin:round}
    .price-chart__axis{stroke:var(--iw-border);stroke-width:1}
    .price-chart__dot{fill:var(--iw-navy)}
    .price-chart__dot--up{fill:#c0392b}
    .price-chart__dot--down{fill:#1a7a3a}
    .price-chart__label{font-size:10px;fill:var(--iw-gray);font-family:var(--font-body)}
    .price-chart__amount{font-size:11px;fill:var(--iw-navy);font-family:var(--font-body);font-weight:bold}
    .price-chart__amount--current{font-size:12px}
    .price-chart__caption{font-size:10px;color:#888;text-align:right;margin-top:2px}

    /* ===== 年額換算表示 ===== */
    .price-annual{font-size:10px;color:#888;margin-left:6px}

    /* ===== アクセシビリティ ===== */
    *:focus-visible{outline:2px solid var(--iw-blue);outline-offset:2px}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* ===== レスポンシブ ===== */
    @media(max-width:768px){
      .service-table .col-updated{display:none}
      .service-table .col-action{width:24%}
      .service-table th,.service-table td{padding:8px 6px;font-size:12px}
      .modal-overlay.open{padding:0;align-items:flex-end}
      .modal{border-radius:8px 8px 0 0;max-height:92vh;overflow-y:auto;max-width:100%}
      .modal-body{padding:14px}
      .history-table{font-size:11px}
      .history-table th,.history-table td{padding:5px 6px}
      .toolbar{flex-direction:column;align-items:stretch}
      .toolbar__input{min-width:0;width:100%}
      .toolbar__count{margin-left:0;text-align:right}
      .cat-nav{padding:8px 0 6px;gap:3px}
      .cat-nav__btn{padding:3px 8px;font-size:11px}
      .page-header__title{font-size:18px}
      .site-header{height:auto}
      .site-header__inner{flex-wrap:wrap;height:auto;padding:8px 12px}
    }

    /* スマホ：テーブルをカード型に */
    @media(max-width:640px){
      .service-table colgroup{display:none}
      .service-table thead{display:none}
      .service-table,.service-table tbody{display:block}
      .service-table tr{display:block;padding:12px;border-bottom:1px solid var(--iw-border)}
      .service-table tr:last-child{border-bottom:none}
      .service-table td{display:block;border:none;padding:0}
      .service-table td+td{margin-top:8px}
      .service-table tr:hover td{background:none}
      .price-row{gap:2px 8px;margin-bottom:6px}
      .btn-detail{display:block;width:100%;text-align:center;padding:9px;font-size:13px;white-space:nowrap}
    }

    /* ===== 印刷用 ===== */
    @media print{
      body{font-size:11pt;color:#000;background:#fff}
      .site-header,.cat-nav,.toolbar,.btn-detail,.modal-overlay,.site-footer,.sim-bar,.sim-check,.news-box{display:none !important}
      .page-header{background:none;border-bottom:2px solid #000;padding:8px 0}
      .page-header__title{color:#000;border:none;padding:0;font-size:16pt}
      .page-header__lead{color:#333;padding:0;font-size:10pt;margin-top:4px}
      .category-section__heading{background:#000;color:#fff;font-size:11pt;page-break-after:avoid}
      .service-table{font-size:9pt;page-break-inside:avoid}
      .service-table tr:hover td{background:none}
      .service-table th{background:#eee;color:#000}
      .col-action{display:none}
      .col-service{width:30%}.col-plans{width:70%}
      .badge-history{display:none}
      .main-wrap{max-width:100%;padding:0}
      a{color:#000;text-decoration:none}
    }

    /* ===== アニメーション抑制（ユーザー設定優先） ===== */
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important}
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <a href="https://www.watch.impress.co.jp/" class="site-header__logo">Impress Watch<span>インプレス</span></a>
    <div class="site-header__breadcrumb">
      <a href="https://www.watch.impress.co.jp/">Home</a> &rsaquo; サブスク料金ナビ
    </div>
  </div>
</header>

<div class="page-header">
  <div class="page-header__inner">
    <h1 class="page-header__title">サブスク料金ナビ</h1>
    <div class="page-header__meta">
      <span class="page-header__updated" id="pageUpdated"></span>
      <button type="button" class="about-toggle" id="aboutToggle" aria-expanded="false" aria-controls="aboutBox">ⓘ このコーナーについて</button>
    </div>
    <div class="page-header__lead" id="aboutBox" hidden>
      <button type="button" class="about-close" id="aboutClose" aria-label="説明を閉じる">&times;</button>
      主要テクノロジー系サブスクリプションサービスの現在価格と価格改定履歴をまとめています。<br>価格は税込・月額を基本とし、ドル建てサービスはUSドル(税別)表記です。
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="news-box" id="newsBox" style="display:none"></div>
  <nav class="cat-nav" id="catNav" aria-label="カテゴリ"></nav>
  <div class="toolbar" role="search">
    <label class="sr-only" for="searchInput">サービス検索</label>
    <input type="search" id="searchInput" class="toolbar__input" placeholder="🔍 サービス名・提供元で検索…" aria-label="サービス検索">
    <button type="button" class="toolbar__filter-btn" id="filterToggle" aria-expanded="false" aria-controls="toolbarOptions">⚙ 絞り込み</button>
    <div class="toolbar__options" id="toolbarOptions" hidden>
      <div class="toolbar__group">
        <label for="sortSelect">並び順:</label>
        <select id="sortSelect" class="toolbar__select" aria-label="並び順">
          <option value="default">カテゴリ順</option>
          <option value="name">サービス名(あいうえお)</option>
          <option value="price-asc">価格が安い順</option>
          <option value="price-desc">価格が高い順</option>
        </select>
      </div>
      <div class="toolbar__group">
        <label for="historyFilter">表示:</label>
        <select id="historyFilter" class="toolbar__select" aria-label="フィルタ">
          <option value="all">すべて</option>
          <option value="history">改定履歴ありのみ</option>
        </select>
      </div>
    </div>
    <button type="button" class="toolbar__filter-btn" id="simToggle" aria-pressed="false" data-tip="気になるプランにチェックを入れると、月額・年額の合計金額をその場で計算できます。サイトにないサブスクの手動追加も可能">🧮 合計シミュレーター</button>
    <div class="toolbar__count" id="resultCount"></div>
  </div>
  <div id="serviceList" aria-live="polite"></div>
</div>

<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
  <div class="modal" id="modalContent"></div>
</div>

<!-- 合計シミュレーターバー -->
<div class="sim-bar" id="simBar" role="status" aria-live="polite">
  <div class="sim-bar__inner" id="simBarInner"></div>
</div>

<footer class="site-footer">
  <div>Copyright &copy; 2024 Impress Corporation. All Rights Reserved.</div>
  <div class="site-footer__note">掲載価格は編集部確認時点の情報です。最新情報は各サービスの公式サイトをご確認ください。</div>
</footer>

<script>
// ===== データはdata/db.jsonから読み込み =====
let DB = null;

// ===== ユーティリティ =====
let categoryMap = {};

function getCurrentPrice(plan){
  const active=plan.price_history.filter(p=>p.valid_to===null);
  if(!active.length)return null;
  return active.reduce((a,b)=>a.valid_from>=b.valid_from?a:b);
}

function fmtAmount(p){
  if(!p.amount) return '価格未確認';
  if(p.currency==='JPY') return p.amount.toLocaleString()+'円';
  return p.amount+' USドル';
}

function fmtBilling(b){
  return b==='monthly'?'/月':b==='annual'?'/年':'';
}

function fmtTax(p){
  if(!p.amount) return '';
  if(p.currency==='USD') return '(税別)';
  return p.tax_included ? '' : '(税別)';
}

function hasHistoryEntry(plan){
  return plan.price_history.some(p=>p.valid_to!==null);
}

function fmtYM(str){
  if(!str) return '現在';
  const d=new Date(str);
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月';
}

// ===== 追加ユーティリティ =====
// USD->JPYざっくり換算（年額換算の比較用、TODO: 為替レートは編集部で確認）
const USD_TO_JPY = 160;
function toJpyAnnual(p){
  if(!p) return 0;
  let monthly = p.currency==='USD' ? p.amount*USD_TO_JPY : p.amount;
  return p.billing==='annual' ? p.amount * (p.currency==='USD'?USD_TO_JPY:1) : monthly*12;
}
// 一覧用：年払いプランのみ月額相当を表示（月額プランの年換算は詳細モーダルへ）
function fmtMonthlyEquiv(p){
  if(!p||p.amount===0||p.billing!=='annual'||p.currency!=='JPY') return '';
  const monthly = Math.round(p.amount/12);
  return `<span class="price-annual">(月${monthly.toLocaleString()}円相当)</span>`;
}
// 詳細モーダル用：年額換算の注記
function fmtAnnualNote(p){
  if(!p||p.amount===0) return '';
  if(p.billing==='annual'){
    return `月額換算：約${Math.round(p.amount/12).toLocaleString()}円（編集部算出）`;
  }
  if(p.currency==='USD'){
    return `年額換算：${(p.amount*12).toLocaleString()}ドル（税別・編集部算出）`;
  }
  return `年額換算：${toJpyAnnual(p).toLocaleString()}円（編集部算出）`;
}
function getMinCurrentPrice(svc){
  // ソート用：そのサービスの最安現在価格（年額換算）
  let min = Infinity;
  svc.plans.forEach(plan=>{
    const cur=getCurrentPrice(plan);
    if(cur && cur.amount > 0){
      const y = toJpyAnnual(cur);
      if(y < min) min = y;
    }
  });
  return min === Infinity ? 0 : min;
}
function svcHasHistory(svc){
  return svc.plans.some(p=>hasHistoryEntry(p));
}

// 直近12カ月以内の価格改定を検出（一覧バッジ用）
function recentChange(svc){
  const cutoff = new Date();
  cutoff.setFullYear(cutoff.getFullYear()-1);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  let up=false, down=false;
  svc.plans.forEach(plan=>{
    const cur = getCurrentPrice(plan);
    if(!cur || !cur.valid_from || cur.valid_from < cutoffStr) return;
    const prev = plan.price_history
      .filter(p=>p!==cur && p.valid_from < cur.valid_from && p.currency===cur.currency && p.billing===cur.billing)
      .sort((a,b)=>b.valid_from.localeCompare(a.valid_from))[0];
    if(!prev) return;
    if(cur.amount > prev.amount) up=true;
    else if(cur.amount < prev.amount) down=true;
  });
  return {up, down};
}
function escapeHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== ステート =====
const state = {
  category: 'all',
  search: '',
  sort: 'default',
  historyFilter: 'all'
};

// ===== カテゴリナビ =====
const catNav=document.getElementById('catNav');
function buildCatNav(){
  [{id:'all',name:'すべて'},...DB.categories].forEach((cat,i)=>{
    const btn=document.createElement('button');
    btn.className='cat-nav__btn'+(i===0?' active':'');
    btn.textContent=cat.name;
    btn.dataset.cat=cat.id;
    btn.setAttribute('aria-pressed', i===0?'true':'false');
    catNav.appendChild(btn);
  });
}
catNav.addEventListener('click',e=>{
  const btn=e.target.closest('.cat-nav__btn');
  if(!btn)return;
  document.querySelectorAll('.cat-nav__btn').forEach(b=>{
    b.classList.remove('active');
    b.setAttribute('aria-pressed','false');
  });
  btn.classList.add('active');
  btn.setAttribute('aria-pressed','true');
  state.category = btn.dataset.cat;
  renderList();
});

// ===== ツールバー =====
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');
const historyFilter = document.getElementById('historyFilter');
let searchTimer;
searchInput.addEventListener('input', e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    state.search = e.target.value.trim().toLowerCase();
    renderList();
  }, 120);
});
sortSelect.addEventListener('change', e=>{ state.sort = e.target.value; updateFilterBtn(); renderList(); });
historyFilter.addEventListener('change', e=>{ state.historyFilter = e.target.value; updateFilterBtn(); renderList(); });

// ===== 絞り込みパネルの開閉 =====
const filterToggle = document.getElementById('filterToggle');
const toolbarOptions = document.getElementById('toolbarOptions');
filterToggle.addEventListener('click', ()=>{
  toolbarOptions.hidden = !toolbarOptions.hidden;
  filterToggle.setAttribute('aria-expanded', toolbarOptions.hidden ? 'false' : 'true');
});
function updateFilterBtn(){
  const parts = [];
  if(state.sort !== 'default') parts.push(sortSelect.options[sortSelect.selectedIndex].text);
  if(state.historyFilter !== 'all') parts.push(historyFilter.options[historyFilter.selectedIndex].text);
  filterToggle.textContent = parts.length ? `⚙ 絞り込み中：${parts.join('・')}` : '⚙ 絞り込み';
  filterToggle.classList.toggle('active', parts.length > 0);
}

// ===== 「このコーナーについて」の開閉（初回のみ自動表示） =====
const aboutBox = document.getElementById('aboutBox');
const aboutToggle = document.getElementById('aboutToggle');
function setAbout(open){
  aboutBox.hidden = !open;
  aboutToggle.setAttribute('aria-expanded', open ? 'true' : 'false');
}
aboutToggle.addEventListener('click', ()=>setAbout(aboutBox.hidden));
document.getElementById('aboutClose').addEventListener('click', ()=>setAbout(false));
try{
  if(!localStorage.getItem('spw_about_seen')){
    setAbout(true);
    localStorage.setItem('spw_about_seen','1');
  }
}catch(e){ /* プライベートブラウズ等でlocalStorage不可の場合は畳んだまま */ }

// ===== 一覧レンダリング =====
function filterServices(){
  let services = DB.services.slice();
  if(state.category !== 'all') services = services.filter(s=>(s.categories||[]).includes(state.category));
  if(state.search){
    services = services.filter(s=>
      s.name.toLowerCase().includes(state.search) ||
      s.provider.toLowerCase().includes(state.search)
    );
  }
  if(state.historyFilter === 'history') services = services.filter(svcHasHistory);
  return services;
}

function renderList(){
  const container=document.getElementById('serviceList');
  container.innerHTML='';
  const services = filterServices();
  document.getElementById('resultCount').textContent = `${services.length} サービス`;

  if(!services.length){
    container.innerHTML = '<div style="padding:40px 12px;text-align:center;color:#888;font-size:13px">該当するサービスがありません。</div>';
    return;
  }

  // ソート処理
  if(state.sort !== 'default'){
    if(state.sort === 'name') services.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
    else if(state.sort === 'price-asc') services.sort((a,b)=>getMinCurrentPrice(a)-getMinCurrentPrice(b));
    else if(state.sort === 'price-desc') services.sort((a,b)=>getMinCurrentPrice(b)-getMinCurrentPrice(a));
    // ソート時はカテゴリでグループ分けせずフラットなリストに
    renderFlat(container, services);
    return;
  }

  // カテゴリ別表示
  const cats = state.category==='all' ? DB.categories : DB.categories.filter(c=>c.id===state.category);
  cats.forEach(cat=>{
    const catServices = services.filter(s=>(s.categories||[]).includes(cat.id));
    if(!catServices.length)return;

    const section=document.createElement('section');
    section.className='category-section';
    section.setAttribute('aria-labelledby', 'cat-'+cat.id);

    const heading=document.createElement('h2');
    heading.id = 'cat-'+cat.id;
    heading.className='category-section__heading';
    heading.textContent=cat.name;
    section.appendChild(heading);

    section.appendChild(buildTable(catServices));
    container.appendChild(section);
  });
}

function renderFlat(container, services){
  const section=document.createElement('section');
  section.className='category-section';
  const heading=document.createElement('h2');
  heading.className='category-section__heading';
  heading.textContent = '検索・ソート結果';
  section.appendChild(heading);
  section.appendChild(buildTable(services, true));
  container.appendChild(section);
}

function buildTable(services, showCat){
  const table=document.createElement('table');
  table.className='service-table';
  table.setAttribute('aria-label','サービス一覧');
  table.innerHTML=`<colgroup><col class="col-service"><col class="col-plans"><col class="col-action"></colgroup>
    <thead><tr>
      <th scope="col">サービス名</th><th scope="col">プラン・価格</th><th scope="col"><span class="sr-only">操作</span></th>
    </tr></thead><tbody></tbody>`;

  const tbody=table.querySelector('tbody');
  services.forEach(svc=>{
    const tr=document.createElement('tr');
    const bigLabel=(svc.categories||[]).some(c=>c==='ai'||c==='cloud-storage');
    const priceHtml=svc.plans.map(plan=>{
      const cur=getCurrentPrice(plan);
      if(!cur)return '';
      const isUSD=cur.currency==='USD';
      const taxNote=fmtTax(cur);
      const annualHtml = fmtMonthlyEquiv(cur);
      const checkbox = cur.amount>0 ? `<input type="checkbox" class="sim-check" data-pid="${plan.id}" ${sim.selected.has(plan.id)?'checked':''} aria-label="${escapeHtml(svc.name)} ${escapeHtml(plan.name)}を合計に追加">` : '';
      return `<div class="price-row">
        ${checkbox}
        <span class="price-label${bigLabel?' large':''}">${escapeHtml(plan.name)}</span>
        <span class="price-amount${isUSD?' usd':''}">${fmtAmount(cur)}</span>
        ${taxNote?`<span class="price-unit">${taxNote}</span>`:''}
        ${cur.amount?`<span class="price-unit">${fmtBilling(cur.billing)}</span>`:''}
        ${annualHtml}
      </div>`;
    }).join('');

    const catLabel = showCat ? `<div class="service-provider">${escapeHtml((svc.categories||[]).map(id=>categoryMap[id]).filter(Boolean).join(' / '))}</div>` : '';
    const chg = recentChange(svc);
    const chgBadges = (chg.up?'<span class="badge-up">値上げ</span>':'') + (chg.down?'<span class="badge-down">値下げ</span>':'');
    tr.innerHTML=`
      <td><div class="service-name">${escapeHtml(svc.name)}${chgBadges}</div><div class="service-provider">${escapeHtml(svc.provider)}</div>${catLabel}</td>
      <td>${priceHtml}</td>
      <td><button class="btn-detail" data-id="${svc.id}" aria-label="${escapeHtml(svc.name)}の詳細と価格推移を見る">詳細・推移 ›</button></td>`;
    tbody.appendChild(tr);
  });
  return table;
}

// ===== 価格推移ミニグラフ（階段状） =====
function buildPriceChart(plan){
  // 現在の通貨と同じエントリのみ描画（ドル建て→円建て移行などの通貨またぎは対象外）
  const curEntry = getCurrentPrice(plan);
  if(!curEntry) return '';
  let history = plan.price_history
    .filter(h=>h.currency===curEntry.currency && h.billing===curEntry.billing && h.amount>0)
    .sort((a,b)=>a.valid_from.localeCompare(b.valid_from));
  if(history.length < 2) return '';
  const W = 600, H = 120, PAD_L = 14, PAD_R = 76, PAD_T = 26, PAD_B = 24;
  const innerW = W - PAD_L - PAD_R, innerH = H - PAD_T - PAD_B;
  const amounts = history.map(h=>h.amount);
  const minA = Math.min(...amounts), maxA = Math.max(...amounts);
  const range = maxA - minA || 1;
  const times = history.map(h=>new Date(h.valid_from).getTime());
  const endT = Math.max(Date.now(), times[times.length-1]);
  const minT = times[0], tRange = endT - minT || 1;
  const X = t => PAD_L + ((t-minT)/tRange)*innerW;
  const Y = a => PAD_T + innerH - ((a-minA)/range)*innerH;
  const unit = curEntry.currency === 'USD' ? '$' : '¥';

  // 階段状パスと改定点
  let pathD = '';
  const points = [];
  history.forEach((h,i)=>{
    const x1 = X(times[i]);
    const x2 = (i < history.length-1) ? X(times[i+1]) : X(endT);
    const yy = Y(h.amount);
    pathD += (i===0 ? `M${x1},${yy}` : `L${x1},${yy}`) + `L${x2},${yy}`;
    const dir = i===0 ? 0 : Math.sign(h.amount - history[i-1].amount);
    points.push({x:x1, y:yy, h, dir});
  });
  const last = history[history.length-1];
  const endY = Y(last.amount);

  const dots = points.map(p=>{
    const cls = p.dir>0 ? ' price-chart__dot--up' : p.dir<0 ? ' price-chart__dot--down' : '';
    return `<circle cx="${p.x}" cy="${p.y}" r="4" class="price-chart__dot${cls}"><title>${fmtYM(p.h.valid_from)}: ${unit}${p.h.amount.toLocaleString()}</title></circle>`;
  }).join('');

  // 金額ラベル（改定点の上）：横に近すぎる場合は間引き
  let lastLabelX = -Infinity;
  const amountLabels = points.map(p=>{
    if(p.x - lastLabelX < 56) return '';
    lastLabelX = p.x;
    return `<text x="${p.x}" y="${p.y-8}" class="price-chart__amount">${unit}${p.h.amount.toLocaleString()}</text>`;
  }).join('');

  // 年ラベル（改定点の下）：近接・同一年は間引き
  let lastYearX = -Infinity, lastYear = null;
  const yearLabels = points.map(p=>{
    const yr = new Date(p.h.valid_from).getFullYear();
    if(p.x - lastYearX < 48 || yr === lastYear) return '';
    lastYearX = p.x; lastYear = yr;
    return `<text x="${p.x}" y="${H-6}" class="price-chart__label">${yr}年</text>`;
  }).join('');

  return `<div class="price-chart">
    <svg class="price-chart__svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="価格推移グラフ">
      <line x1="${PAD_L}" y1="${PAD_T+innerH}" x2="${W-PAD_R}" y2="${PAD_T+innerH}" class="price-chart__axis"/>
      <path class="price-chart__line" d="${pathD}"/>
      ${dots}
      ${amountLabels}
      ${yearLabels}
      <text x="${W-PAD_R+8}" y="${endY+4}" class="price-chart__amount price-chart__amount--current">${unit}${last.amount.toLocaleString()}</text>
      <text x="${W-PAD_R+8}" y="${endY+16}" class="price-chart__label">現在</text>
    </svg>
  </div>`;
}

// ===== モーダル =====
const overlay=document.getElementById('modalOverlay');

document.getElementById('serviceList').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-detail');
  if(btn) openModal(btn.dataset.id);
});
overlay.addEventListener('click',e=>{ if(e.target===overlay)closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

function openModal(id){
  const svc=DB.services.find(s=>s.id===id);
  if(!svc)return;

  let plansHtml='';
  svc.plans.forEach(plan=>{
    const sorted=[...plan.price_history].sort((a,b)=>new Date(b.valid_from)-new Date(a.valid_from));
    const rows=sorted.map((h,idx)=>{
      const isCur=h.valid_to===null;
      const period=isCur?`${fmtYM(h.valid_from)} 〜 現在`:`${fmtYM(h.valid_from)} 〜 ${fmtYM(h.valid_to)}`;
      const next=sorted[idx+1];
      let changeBadge='';
      if(next && next.currency===h.currency){
        if(h.amount>next.amount) changeBadge='<span class="badge-up">値上げ</span>';
        else if(h.amount<next.amount) changeBadge='<span class="badge-down">値下げ</span>';
      }
      const taxNote=fmtTax(h);
      const srcHtml=h.source?`<span class="source-link">(<a href="${h.source}" target="_blank" rel="noopener">出典</a>)</span>`:'';
      return `<tr class="${isCur?'current':''}">
        <td>${period}</td>
        <td>${fmtAmount(h)}${taxNote}${h.amount?fmtBilling(h.billing):''}${isCur?'<span class="badge-current">現在</span>':''}${changeBadge}</td>
        <td>${h.note||'—'} ${srcHtml}</td>
      </tr>`;
    }).join('');

    const nameDesc=plan.name+(plan.description?' — '+plan.description:'');
    const chart = buildPriceChart(plan);
    const annualNote = fmtAnnualNote(getCurrentPrice(plan));
    plansHtml+=`<div class="plan-block">
      <div class="plan-name">${escapeHtml(nameDesc)}</div>
      ${annualNote?`<div class="plan-annual">${annualNote}</div>`:''}
      ${chart}
      <table class="history-table">
        <thead><tr>
          <th scope="col" style="width:32%">適用期間</th>
          <th scope="col" style="width:32%">価格</th>
          <th scope="col" style="width:36%">備考</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header">
      <div>
        <div class="modal-header__title">${escapeHtml(svc.name)}</div>
        <div class="modal-header__sub">${escapeHtml(svc.provider)} &mdash; ${escapeHtml((svc.categories||[]).map(id=>categoryMap[id]).filter(Boolean).join(' / '))}</div>
      </div>
      <button class="modal-close" id="modalCloseBtn" aria-label="閉じる">&times;</button>
    </div>
    <div class="modal-body">
      <p class="modal-sec-title">サービス概要</p>
      <p class="modal-desc">${escapeHtml(svc.description).replace(/\n/g,'<br>')}</p>
      <p class="modal-url">公式サイト：<a href="${escapeHtml(svc.url)}" target="_blank" rel="noopener">${escapeHtml(svc.url_label)} ↗</a></p>
      <p class="modal-sec-title">価格一覧・改定履歴</p>
      ${plansHtml}
    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  const closeBtn = document.getElementById('modalCloseBtn');
  closeBtn.addEventListener('click',closeModal);
  closeBtn.focus();
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
}

// ===== 合計シミュレーター =====
const sim = { mode: false, selected: new Set(), custom: [] };
let simPlanMap = {};  // plan.id → {svc, plan}

function simLoad(){
  try {
    const raw = localStorage.getItem('spw_sim');
    if(!raw) return;
    const d = JSON.parse(raw);
    sim.mode = !!d.mode;
    (d.ids||[]).forEach(id=>{ if(simPlanMap[id]) sim.selected.add(id); });
    sim.custom = (d.custom||[]).filter(c=>c && c.name && c.amount>0);
  } catch(e){}
}
function simSave(){
  try { localStorage.setItem('spw_sim', JSON.stringify({mode:sim.mode, ids:[...sim.selected], custom:sim.custom})); } catch(e){}
}

function setSimMode(on){
  sim.mode = on;
  document.body.classList.toggle('sim-mode', on);
  const btn = document.getElementById('simToggle');
  btn.classList.toggle('active', on);
  btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  updateSimBar();
}

function simTotals(){
  let mJPY=0, yJPY=0, mUSD=0, yUSD=0, count=0;
  sim.selected.forEach(pid=>{
    const info = simPlanMap[pid];
    if(!info) return;
    const cur = getCurrentPrice(info.plan);
    if(!cur || !cur.amount) return;
    count++;
    const m = cur.billing==='annual' ? cur.amount/12 : cur.amount;
    const y = cur.billing==='annual' ? cur.amount : cur.amount*12;
    if(cur.currency==='USD'){ mUSD+=m; yUSD+=y; } else { mJPY+=m; yJPY+=y; }
  });
  sim.custom.forEach(c=>{ mJPY+=c.amount; yJPY+=c.amount*12; count++; });
  return { mJPY:Math.round(mJPY), yJPY:Math.round(yJPY), mUSD:Math.round(mUSD), yUSD:Math.round(yUSD), count };
}

function updateSimBar(){
  const bar = document.getElementById('simBar');
  const t = simTotals();
  simSave();
  if(!sim.mode){
    bar.classList.remove('show');
    document.body.classList.remove('sim-open');
    return;
  }
  const fm = n=>n.toLocaleString();
  let body;
  if(!t.count){
    body = `<span>🧮 一覧のプランにチェックを入れると合計金額を計算します</span>
      <span style="flex:1"></span>
      <button class="sim-bar__btn" id="simAddCustom">＋その他を追加</button>
      <button class="sim-bar__btn" id="simExit">✕ 閉じる</button>`;
  } else {
    const mParts=[]; if(t.mJPY) mParts.push(fm(t.mJPY)+'円'); if(t.mUSD) mParts.push(fm(t.mUSD)+' USドル');
    const yParts=[]; if(t.yJPY) yParts.push(fm(t.yJPY)+'円'); if(t.yUSD) yParts.push(fm(t.yUSD)+' USドル');
    const chips = sim.custom.map((c,i)=>
      `<span class="sim-chip">${escapeHtml(c.name)} ${fm(c.amount)}円<button data-ci="${i}" aria-label="${escapeHtml(c.name)}を削除">✕</button></span>`
    ).join('');
    body = `<span>🧮 ${t.count}件選択中</span>
      <span class="sim-bar__total">月 ${mParts.join(' + ')||'0円'} <small>／ 年 ${yParts.join(' + ')||'0円'}</small></span>
      ${chips}
      <span style="flex:1"></span>
      <button class="sim-bar__btn" id="simAddCustom">＋その他を追加</button>
      <button class="sim-bar__btn" id="simClear">クリア</button>
      <button class="sim-bar__btn" id="simExit">✕ 閉じる</button>`;
  }
  document.getElementById('simBarInner').innerHTML = body;
  bar.classList.add('show');
  document.body.classList.add('sim-open');
}

// モード切り替えボタン
document.getElementById('simToggle').addEventListener('click', ()=>setSimMode(!sim.mode));

// チェックボックス（一覧内・再描画されるためデリゲート）
document.getElementById('serviceList').addEventListener('change', e=>{
  const cb = e.target.closest('.sim-check');
  if(!cb) return;
  if(cb.checked) sim.selected.add(cb.dataset.pid);
  else sim.selected.delete(cb.dataset.pid);
  updateSimBar();
});

// バー内ボタン（デリゲート）
document.getElementById('simBar').addEventListener('click', e=>{
  if(e.target.id === 'simExit'){
    setSimMode(false);
    return;
  }
  if(e.target.id === 'simClear'){
    sim.selected.clear();
    sim.custom = [];
    updateSimBar();
    renderList();  // チェック状態を反映し直す
    return;
  }
  if(e.target.id === 'simAddCustom'){
    const name = prompt('サービス名（このサイトにないサブスクを合計に足せます）');
    if(!name || !name.trim()) return;
    const amtStr = prompt(`「${name.trim()}」の月額（円・税込）`);
    const amt = Number(amtStr);
    if(!amt || amt <= 0){ alert('金額は1以上の数字で入力してください'); return; }
    sim.custom.push({ name: name.trim(), amount: Math.round(amt) });
    updateSimBar();
    return;
  }
  const del = e.target.closest('.sim-chip button');
  if(del){
    sim.custom.splice(Number(del.dataset.ci), 1);
    updateSimBar();
  }
});

// ===== 改定ニュース欄（price_historyから自動生成） =====
function buildNews(){
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 6);
  const cutoffStr = cutoff.toISOString().slice(0,10);
  const items = [];

  DB.services.forEach(svc=>{
    svc.plans.forEach(plan=>{
      const sorted = [...plan.price_history].sort((a,b)=>String(a.valid_from||'').localeCompare(String(b.valid_from||'')));
      sorted.forEach((e,i)=>{
        if(!e.valid_from || e.valid_from < cutoffStr || !e.amount) return;
        const prev = i > 0 ? sorted[i-1] : null;
        if(!prev){
          items.push({date:e.valid_from, svc, plan, type:'new', cur:e});
        } else if(prev.currency===e.currency && prev.billing===e.billing){
          if(e.amount > prev.amount) items.push({date:e.valid_from, svc, plan, type:'up', prev, cur:e});
          else if(e.amount < prev.amount) items.push({date:e.valid_from, svc, plan, type:'down', prev, cur:e});
        } else {
          // 通貨・支払い単位の変更（ドル建て→円建てなど）
          items.push({date:e.valid_from, svc, plan, type:'changed', prev, cur:e});
        }
      });
    });
  });

  items.sort((a,b)=>b.date.localeCompare(a.date));
  const top = items.slice(0,8);
  if(!top.length) return;  // ニュースがなければ枠ごと非表示のまま

  const fmtA = (a,c)=> c==='USD' ? a.toLocaleString()+' USドル' : a.toLocaleString()+'円';
  const fmtD = s=>{ const d=new Date(s); return d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate(); };

  const rows = top.map(it=>{
    const badge = it.type==='up'   ? '<span class="badge-up">値上げ</span>'
                : it.type==='down' ? '<span class="badge-down">値下げ</span>'
                : it.type==='new'  ? '<span class="badge-new">新プラン</span>'
                :                    '<span class="badge-new">改定</span>';
    const label = `<a class="news-link" data-id="${it.svc.id}">${escapeHtml(it.svc.name)}</a> ${escapeHtml(it.plan.name)}`;
    let text;
    if(it.type==='new'){
      text = `${label} が登場 — ${fmtA(it.cur.amount,it.cur.currency)}${fmtBilling(it.cur.billing)}`;
    } else if(it.type==='changed'){
      text = `${label} — ${fmtA(it.cur.amount,it.cur.currency)}${fmtBilling(it.cur.billing)}に${it.cur.note?`（${escapeHtml(it.cur.note)}）`:''}`;
    } else {
      text = `${label} — ${fmtA(it.prev.amount,it.prev.currency)} → <b>${fmtA(it.cur.amount,it.cur.currency)}</b>${fmtBilling(it.cur.billing)}`;
    }
    return `<li><span class="news-date">${fmtD(it.date)}</span>${badge}<span>${text}</span></li>`;
  }).join('');

  const box = document.getElementById('newsBox');
  // 未読の改定があるときだけ自動展開（既読なら1行に折りたたみ）
  const latest = top[0].date;
  let seen = null;
  try { seen = localStorage.getItem('spw_news_seen'); } catch(e){}
  const expand = !seen || latest > seen;

  box.innerHTML = `<button type="button" class="news-box__head" id="newsToggle" aria-expanded="${expand}">📰 最近の価格改定・新プラン<span class="news-count">${top.length}件</span><span class="news-arrow">${expand?'▾':'▸'}</span></button><ul>${rows}</ul>`;
  box.classList.toggle('collapsed', !expand);
  box.style.display = 'block';
  if(expand){
    try { localStorage.setItem('spw_news_seen', latest); } catch(e){}
  }

  box.addEventListener('click', e=>{
    const a = e.target.closest('.news-link');
    if(a){ openModal(a.dataset.id); return; }
    const head = e.target.closest('#newsToggle');
    if(head){
      const nowCollapsed = !box.classList.contains('collapsed');
      box.classList.toggle('collapsed', nowCollapsed);
      head.setAttribute('aria-expanded', nowCollapsed ? 'false' : 'true');
      head.querySelector('.news-arrow').textContent = nowCollapsed ? '▸' : '▾';
      if(!nowCollapsed){
        try { localStorage.setItem('spw_news_seen', latest); } catch(e){}
      }
    }
  });
}

  .then(db=>{

    }
    DB.services.forEach(svc=>svc.plans.forEach(plan=>{ simPlanMap[plan.id] = {svc, plan}; }));
    simLoad();
    buildCatNav();
    buildNews();
    renderList();
    setSimMode(sim.mode);
  })

    document.getElementById('serviceList').innerHTML =
      '<div style="padding:40px 12px;text-align:center;color:#c00;font-size:13px">データの読み込みに失敗しました（'+escapeHtml(err.message)+'）。HTTPサーバー経由で開いてください。</div>';
  });
</script>
