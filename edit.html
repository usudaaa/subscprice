<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>編集ツール — サブスクリプション価格ウォッチ</title>
  <style>
    :root {
      --navy:  #003399;
      --blue:  #0055cc;
      --light: #e8f0fb;
      --border:#c8d4ec;
      --gray:  #555;
      --font:  "Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);font-size:14px;background:#f0f4fa;color:#1a1a1a}

    /* ===== ツールバー ===== */
    .toolbar{background:var(--navy);color:#fff;padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,64,.3)}
    .toolbar__title{font-size:15px;font-weight:bold;flex:1}
    .toolbar__badge{background:rgba(255,255,255,.15);font-size:11px;padding:2px 8px;border-radius:10px}
    .btn{border:none;border-radius:3px;cursor:pointer;font-family:var(--font);font-size:13px;padding:7px 14px;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-primary{background:#fff;color:var(--navy);font-weight:bold}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-sm{font-size:12px;padding:4px 10px}
    .btn-danger{background:#c00;color:#fff}
    .btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
    .btn-green{background:#1a7a3a;color:#fff}
    .btn-green:hover{background:#145f2d}
    #saveStatus{font-size:12px;padding:3px 10px;border-radius:3px;display:none;margin-left:4px}
    #saveStatus.ok{display:inline;background:#d4edda;color:#155724;border:1px solid #c3e6cb}
    #saveStatus.err{display:inline;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}

    /* ===== レイアウト ===== */
    .layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 52px)}

    /* ===== サービス一覧パネル ===== */
    .sidebar{background:#fff;border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 52px);position:sticky;top:52px}
    .sidebar__search{padding:10px;border-bottom:1px solid var(--border)}
    .sidebar__search input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:3px;font-size:13px;font-family:var(--font)}
    .sidebar__cat{padding:6px 12px 2px;font-size:11px;font-weight:bold;color:#fff;background:var(--navy);margin-top:4px;letter-spacing:.05em}
    .sidebar__item{padding:8px 14px;cursor:pointer;border-bottom:1px solid #eef;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:4px}
    .sidebar__item:hover{background:var(--light)}
    .sidebar__item.active{background:var(--light);border-left:3px solid var(--navy);font-weight:bold}
    .sidebar__item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sidebar__item-provider{font-size:11px;color:#999;white-space:nowrap}
    .sidebar__add{padding:10px 12px;border-top:2px solid var(--border)}

    /* ===== 編集フォーム ===== */
    .editor{padding:20px 24px;overflow-y:auto}
    .editor__empty{display:flex;align-items:center;justify-content:center;height:60vh;color:#aaa;font-size:15px;flex-direction:column;gap:8px}
    .editor__empty svg{opacity:.3}

    .form-card{background:#fff;border:1px solid var(--border);border-radius:4px;margin-bottom:16px;overflow:hidden}
    .form-card__head{background:var(--navy);color:#fff;padding:8px 16px;font-size:13px;font-weight:bold;display:flex;align-items:center;gap:8px}
    .form-card__head .badge{background:rgba(255,255,255,.2);font-size:10px;padding:1px 6px;border-radius:8px;font-weight:normal}
    .form-card__body{padding:16px}

    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .field-row.full{grid-template-columns:1fr}
    .field-row.triple{grid-template-columns:1fr 1fr 1fr}
    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:12px;color:var(--gray);font-weight:bold}
    .field input,.field select,.field textarea{padding:6px 10px;border:1px solid var(--border);border-radius:3px;font-size:13px;font-family:var(--font);width:100%}
    .field textarea{resize:vertical;min-height:72px;line-height:1.6}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(0,85,204,.15)}
    .field-note{font-size:11px;color:#999;margin-top:2px}

    /* 価格履歴エントリ */
    .price-entry{background:#f8faff;border:1px solid var(--border);border-radius:3px;padding:12px;margin-bottom:10px;position:relative}
    .price-entry__head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .price-entry__label{font-size:12px;font-weight:bold;color:var(--navy)}
    .price-entry.current{background:#fffbe8;border-color:#c8a000}
    .price-entry.current .price-entry__label::after{content:'現在';background:var(--navy);color:#fff;font-size:10px;padding:1px 5px;border-radius:2px;margin-left:6px;font-weight:normal}

    /* プランブロック */
    .plan-block{background:#f4f7fc;border:1px solid var(--border);border-radius:4px;padding:14px;margin-bottom:12px}
    .plan-block__head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .plan-block__title{font-size:13px;font-weight:bold;color:var(--navy)}

    /* アクションバー */
    .action-bar{background:#fff;border:1px solid var(--border);border-radius:4px;padding:14px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
    .action-bar__name{font-weight:bold;font-size:14px;flex:1}
    .save-notice{font-size:12px;color:#080;background:#e8f8e8;border:1px solid #4a4;border-radius:3px;padding:3px 10px;display:none}
    .save-notice.show{display:inline}

    /* コピーモーダル */
    .copy-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:20px}
    .copy-modal.open{display:flex}
    .copy-modal__box{background:#fff;border-radius:4px;width:100%;max-width:640px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,64,.3)}
    .copy-modal__head{background:var(--navy);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
    .copy-modal__head h2{font-size:15px}
    .copy-modal__body{padding:16px}
    .copy-modal__steps{margin-bottom:14px}
    .copy-modal__steps li{margin-bottom:6px;font-size:13px;line-height:1.6}
    .copy-modal__steps code{background:#f0f4fa;padding:1px 6px;border-radius:2px;font-size:12px}
    .copy-modal__textarea{width:100%;height:180px;font-size:11px;font-family:monospace;border:1px solid var(--border);border-radius:3px;padding:8px;resize:none;background:#f8f8f8}
    .copy-modal__actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
  </style>
</head>
<body>

<!-- ツールバー -->
<div class="toolbar">
  <div class="toolbar__title">📋 サブスクリプション価格ウォッチ <span class="toolbar__badge">編集ツール</span></div>
  <button class="btn btn-green btn-sm" onclick="saveToIndex()" id="btnSaveToIndex">⬆ index.htmlに即反映</button>
  <span id="saveStatus"></span>
  <button class="btn btn-ghost btn-sm" onclick="openCopyModal()">全データをコピー／エクスポート</button>
  <a href="index.html" class="btn btn-primary btn-sm" target="_blank">← 一覧ページを確認</a>
</div>

<div class="layout">
  <!-- サービス一覧 -->
  <aside class="sidebar">
    <div class="sidebar__search">
      <input type="text" id="searchInput" placeholder="サービス名で検索…" oninput="filterSidebar(this.value)">
    </div>
    <div id="sidebarList"></div>
    <div class="sidebar__add">
      <button class="btn btn-blue btn-sm" style="width:100%" onclick="addNewService()">＋ 新規サービスを追加</button>
    </div>
  </aside>

  <!-- 編集エリア -->
  <main class="editor" id="editor">
    <div class="editor__empty">
      <div style="font-size:40px">📂</div>
      <div>左のリストからサービスを選んでください</div>
    </div>
  </main>
</div>

<!-- コピーモーダル -->
<div class="copy-modal" id="copyModal">
  <div class="copy-modal__box">
    <div class="copy-modal__head">
      <h2>全データのエクスポート</h2>
      <button class="btn btn-ghost btn-sm" onclick="closeCopyModal()">✕ 閉じる</button>
    </div>
    <div class="copy-modal__body">
      <ol class="copy-modal__steps">
        <li>下のテキストをすべて選択してコピー（<code>Ctrl+A</code> → <code>Ctrl+C</code>）</li>
        <li><code>index.html</code> をテキストエディタで開く</li>
        <li><code>const DB = {</code> から始まる行を探し、<code>};</code> までの範囲を選択して上書き貼り付け</li>
        <li>保存してブラウザをリロード</li>
      </ol>
      <textarea class="copy-modal__textarea" id="exportTextarea" readonly></textarea>
      <div class="copy-modal__actions">
        <button class="btn btn-blue" onclick="copyToClipboard()">📋 クリップボードにコピー</button>
        <button class="btn btn-blue" style="background:#1a6e40" onclick="downloadExport()">💾 export.json に保存</button>
        <button class="btn btn-ghost" style="background:#888;color:#fff" onclick="closeCopyModal()">閉じる</button>
      </div>
      <div id="copyDone" style="font-size:12px;color:#080;margin-top:8px;display:none">✔ コピーしました！</div>
      <div id="saveDone" style="font-size:12px;color:#080;margin-top:8px;display:none">✔ ダウンロードしました。<code>data/export.json</code> に移動してから <code>/update-db</code> を実行してください。</div>
    </div>
  </div>
</div>

// ===== 状態管理 =====
let currentServiceId = null;

// ===== サイドバー描画 =====
function renderSidebar(filter = '') {
  const list = document.getElementById('sidebarList');
  list.innerHTML = '';
  DB.categories.forEach(cat => {
    const services = DB.services.filter(s =>
      (s.categories||[]).includes(cat.id) &&
      (!filter || s.name.includes(filter) || s.provider.includes(filter))
    );
    if (!services.length) return;
    const catEl = document.createElement('div');
    catEl.className = 'sidebar__cat';
    catEl.textContent = cat.name;
    list.appendChild(catEl);
    services.forEach(svc => {
      const el = document.createElement('div');
      el.className = 'sidebar__item' + (svc.id === currentServiceId ? ' active' : '');
      el.innerHTML = `<span class="sidebar__item-name">${svc.name}</span><span class="sidebar__item-provider">${svc.provider}</span>`;
      el.onclick = () => selectService(svc.id);
      list.appendChild(el);
    });
  });
}

function filterSidebar(v) { renderSidebar(v); }

// ===== サービス選択 =====
function selectService(id) {
  currentServiceId = id;
  renderSidebar(document.getElementById('searchInput').value);
  const svc = DB.services.find(s => s.id === id);
  renderEditor(svc);
}

// ===== エディタ描画 =====
function renderEditor(svc) {
  const editor = document.getElementById('editor');

  const catOptions = DB.categories.map(c =>
    `<option value="${c.id}" ${(svc.categories||[])[0] === c.id ? 'selected' : ''}>${c.name}</option>`
  ).join('');

  let plansHtml = svc.plans.map((plan, pi) => renderPlan(plan, pi)).join('');

  editor.innerHTML = `
    <div class="action-bar">
      <div class="action-bar__name">${svc.name}</div>
      <span class="save-notice" id="saveNotice">✔ 保存しました</span>
      <button class="btn btn-blue" onclick="saveService()">このサービスを保存</button>
    </div>

    <div class="form-card">
      <div class="form-card__head">基本情報</div>
      <div class="form-card__body">
        <div class="field-row">
          <div class="field"><label>サービス名</label><input id="f_name" value="${esc(svc.name)}"></div>
          <div class="field"><label>提供会社</label><input id="f_provider" value="${esc(svc.provider)}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>カテゴリ</label><select id="f_category">${catOptions}</select></div>
          <div class="field"><label>公式URL</label><input id="f_url" value="${esc(svc.url)}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>URLラベル（リンクテキスト）</label><input id="f_url_label" value="${esc(svc.url_label)}"></div>
        </div>
        <div class="field-row full">
          <div class="field"><label>概要説明</label><textarea id="f_description">${esc(svc.description)}</textarea></div>
        </div>
      </div>
    </div>

    <div id="plansContainer">${plansHtml}</div>

    <button class="btn btn-blue btn-sm" onclick="addPlan()" style="margin-bottom:24px">＋ プランを追加</button>
  `;
}

function renderPlan(plan, pi) {
  const historyHtml = [...plan.price_history]
    .sort((a, b) => new Date(b.valid_from) - new Date(a.valid_from))
    .map((h, hi) => renderHistoryEntry(h, pi, hi))
    .join('');

  return `
    <div class="form-card" id="plan_${pi}">
      <div class="form-card__head">
        プラン <span class="badge">${pi + 1}</span>
        <span style="flex:1"></span>
        <button class="btn btn-danger btn-sm" onclick="deletePlan(${pi})" style="font-size:11px">削除</button>
      </div>
      <div class="form-card__body">
        <div class="field-row">
          <div class="field"><label>プラン名</label><input id="p_${pi}_name" value="${esc(plan.name)}"></div>
          <div class="field"><label>プラン説明（任意）</label><input id="p_${pi}_desc" value="${esc(plan.description)}"></div>
        </div>
        <div style="font-size:12px;font-weight:bold;color:var(--navy);margin-bottom:8px">価格履歴</div>
        <div id="history_${pi}">${historyHtml}</div>
        <button class="btn btn-blue btn-sm" onclick="addHistory(${pi})" style="margin-top:4px">＋ 価格履歴を追加（値上げ・値下げ時）</button>
      </div>
    </div>`;
}

function renderHistoryEntry(h, pi, hi) {
  const isCurrent = h.valid_to === null;
  return `
    <div class="price-entry ${isCurrent ? 'current' : ''}" id="h_${pi}_${hi}">
      <div class="price-entry__head">
        <span class="price-entry__label">${isCurrent ? '現在の価格' : '過去の価格'}</span>
        <button class="btn btn-danger btn-sm" onclick="deleteHistory(${pi},${hi})">削除</button>
      </div>
      <div class="field-row triple">
        <div class="field">
          <label>金額</label>
          <input type="number" id="h_${pi}_${hi}_amount" value="${h.amount}">
        </div>
        <div class="field">
          <label>通貨</label>
          <select id="h_${pi}_${hi}_currency">
            <option value="JPY" ${h.currency==='JPY'?'selected':''}>JPY（円）</option>
            <option value="USD" ${h.currency==='USD'?'selected':''}>USD（ドル）</option>
          </select>
        </div>
        <div class="field">
          <label>支払い単位</label>
          <select id="h_${pi}_${hi}_billing">
            <option value="monthly" ${h.billing==='monthly'?'selected':''}>monthly（月払い）</option>
            <option value="annual" ${h.billing==='annual'?'selected':''}>annual（年払い）</option>
          </select>
        </div>
      </div>
      <div class="field-row triple">
        <div class="field">
          <label>税込/税別</label>
          <select id="h_${pi}_${hi}_tax">
            <option value="true" ${h.tax_included?'selected':''}>税込</option>
            <option value="false" ${!h.tax_included?'selected':''}>税別</option>
          </select>
        </div>
        <div class="field">
          <label>適用開始日</label>
          <input type="date" id="h_${pi}_${hi}_from" value="${h.valid_from||''}">
        </div>
        <div class="field">
          <label>適用終了日（空欄=現在）</label>
          <input type="date" id="h_${pi}_${hi}_to" value="${h.valid_to||''}">
          <div class="field-note">値上げ時は旧価格のここに日付を入力</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>備考・メモ</label>
          <input id="h_${pi}_${hi}_note" value="${esc(h.note||'')}">
        </div>
        <div class="field">
          <label>出典URL</label>
          <input id="h_${pi}_${hi}_source" value="${esc(h.source||'')}">
        </div>
      </div>
    </div>`;
}

// ===== 保存処理 =====
function saveService() {
  const svc = DB.services.find(s => s.id === currentServiceId);
  svc.name     = document.getElementById('f_name').value;
  svc.provider = document.getElementById('f_provider').value;
  const catVal = document.getElementById('f_category').value;
  svc.categories = catVal ? [catVal] : (svc.categories||[]);
  svc.url      = document.getElementById('f_url').value;
  svc.url_label= document.getElementById('f_url_label').value;
  svc.description = document.getElementById('f_description').value;

  svc.plans.forEach((plan, pi) => {
    plan.name        = document.getElementById(`p_${pi}_name`).value;
    plan.description = document.getElementById(`p_${pi}_desc`).value;

    plan.price_history.forEach((h, hi) => {
      h.amount      = Number(document.getElementById(`h_${pi}_${hi}_amount`).value);
      h.currency    = document.getElementById(`h_${pi}_${hi}_currency`).value;
      h.billing     = document.getElementById(`h_${pi}_${hi}_billing`).value;
      h.tax_included= document.getElementById(`h_${pi}_${hi}_tax`).value === 'true';
      h.valid_from  = document.getElementById(`h_${pi}_${hi}_from`).value || null;
      const toVal   = document.getElementById(`h_${pi}_${hi}_to`).value;
      h.valid_to    = toVal || null;
      h.note        = document.getElementById(`h_${pi}_${hi}_note`).value;
      h.source      = document.getElementById(`h_${pi}_${hi}_source`).value;
    });
  });

  // アクションバーに完了通知
  const notice = document.getElementById('saveNotice');
  notice.classList.add('show');
  setTimeout(() => notice.classList.remove('show'), 2500);
  renderSidebar(document.getElementById('searchInput').value);
}

// ===== プラン追加・削除 =====
function addPlan() {
  const svc = DB.services.find(s => s.id === currentServiceId);
  const newPlan = {
    id: svc.id + '-plan-' + Date.now(),
    name: '新規プラン',
    description: '',
    price_history: [{
      amount: 0, currency: 'JPY', billing: 'monthly',
      tax_included: true, valid_from: today(), valid_to: null,
      source: '', note: ''
    }]
  };
  svc.plans.push(newPlan);
  const pi = svc.plans.length - 1;
  document.getElementById('plansContainer').insertAdjacentHTML('beforeend', renderPlan(newPlan, pi));
}

function deletePlan(pi) {
  if (!confirm('このプランを削除しますか？')) return;
  const svc = DB.services.find(s => s.id === currentServiceId);
  svc.plans.splice(pi, 1);
  renderEditor(svc);
}

// ===== 価格履歴追加・削除 =====
function addHistory(pi) {
  const svc = DB.services.find(s => s.id === currentServiceId);
  const plan = svc.plans[pi];

  // 既存の「現在価格」を終了させる（valid_toを昨日にする）
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0,10);
  plan.price_history.forEach(h => { if (h.valid_to === null) h.valid_to = yStr; });

  plan.price_history.push({
    amount: 0, currency: 'JPY', billing: 'monthly',
    tax_included: true, valid_from: today(), valid_to: null,
    source: '', note: '価格改定'
  });
  const hi = plan.price_history.length - 1;
  document.getElementById(`history_${pi}`).insertAdjacentHTML('afterbegin',
    renderHistoryEntry(plan.price_history[hi], pi, hi)
  );
}

function deleteHistory(pi, hi) {
  if (!confirm('この価格履歴エントリを削除しますか？')) return;
  const svc = DB.services.find(s => s.id === currentServiceId);
  svc.plans[pi].price_history.splice(hi, 1);
  renderEditor(svc);
}

// ===== 新規サービス追加 =====
function addNewService() {
  const name = prompt('サービス名を入力してください:');
  if (!name) return;
  const catId = DB.categories[0].id;
  const id = name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + Date.now();
  const newSvc = {
    id, name, provider: '', category: catId,
    url: '', url_label: name + '詳細ページ', description: '',
    plans: [{
      id: id + '-plan1', name: '月額プラン', description: '',
      price_history: [{
        amount: 0, currency: 'JPY', billing: 'monthly',
        tax_included: true, valid_from: today(), valid_to: null,
        source: '', note: 'サービス開始時'
      }]
    }]
  };
  DB.services.push(newSvc);
  selectService(id);
}

// ===== エクスポート =====
function openCopyModal() {
  document.getElementById('exportTextarea').value = 'const DB = ' + JSON.stringify(DB, null, 2) + ';';
  document.getElementById('copyModal').classList.add('open');
  document.getElementById('copyDone').style.display = 'none';
}
function closeCopyModal() {
  document.getElementById('copyModal').classList.remove('open');
}
function copyToClipboard() {
  const ta = document.getElementById('exportTextarea');
  ta.select();
  document.execCommand('copy');
  document.getElementById('copyDone').style.display = 'block';
  document.getElementById('saveDone').style.display = 'none';
}
function downloadExport() {
  const json = JSON.stringify(DB, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'export.json';
  a.click();
  URL.revokeObjectURL(a.href);
  document.getElementById('saveDone').style.display = 'block';
  document.getElementById('copyDone').style.display = 'none';
}

async function saveToIndex() {
  const btn = document.getElementById('btnSaveToIndex');
  const status = document.getElementById('saveStatus');
  btn.disabled = true;
  btn.textContent = '保存中...';
  status.className = '';
  status.textContent = '';
  try {
    const res = await fetch('/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(DB)
    });
    const data = await res.json();
    if (data.ok) {
      status.className = 'ok';
      status.textContent = '✔ 反映しました！index.htmlをリロードすると更新されます';
      setTimeout(() => { status.className = ''; status.textContent = ''; }, 4000);
    } else {
      throw new Error(data.error || '不明なエラー');
    }
  } catch (e) {
    status.className = 'err';
    status.textContent = '✖ 失敗（serve.ps1が起動中か確認してください）';
  } finally {
    btn.disabled = false;
    btn.textContent = '⬆ index.htmlに即反映';
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function today(){ return new Date().toISOString().slice(0,10); }

renderSidebar();
</script>
