<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>サブスクリプション価格ウォッチ — Impress Watch</title>
  <style>
    /* ===== Impress Watch トンマナ（ブルー系） ===== */
    :root {
      --iw-navy:      #003399;
      --iw-blue:      #0055cc;
      --iw-blue-mid:  #1a5fb4;
      --iw-blue-light:#e8f0fb;
      --iw-dark:      #1a1a1a;
      --iw-gray:      #555555;
      --iw-light-gray:#f4f6f9;
      --iw-border:    #d0d8e8;
      --iw-link:      #0044bb;
      --iw-link-hover:#cc2200;
      --font-body:    "Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP",Meiryo,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);font-size:14px;line-height:1.7;color:var(--iw-dark);background:#fff}

    /* ===== ヘッダー ===== */
    .site-header{background:var(--iw-navy);border-bottom:3px solid #001f77}
    .site-header__inner{max-width:980px;margin:0 auto;padding:0 12px;display:flex;align-items:center;height:48px;gap:16px}
    .site-header__logo{color:#fff;font-size:19px;font-weight:bold;text-decoration:none;letter-spacing:-0.02em}
    .site-header__logo span{font-size:11px;font-weight:normal;opacity:.8;margin-left:6px}
    .site-header__breadcrumb{color:rgba(255,255,255,.75);font-size:12px}
    .site-header__breadcrumb a{color:rgba(255,255,255,.85);text-decoration:none}
    .site-header__breadcrumb a:hover{color:#fff}

    /* ===== ページヘッダー ===== */
    .page-header{background:var(--iw-blue-light);border-bottom:2px solid var(--iw-navy);padding:18px 0 14px}
    .page-header__inner{max-width:980px;margin:0 auto;padding:0 12px}
    .page-header__title{font-size:22px;font-weight:bold;color:var(--iw-navy);margin-bottom:6px;border-left:4px solid var(--iw-navy);padding-left:10px}
    .page-header__lead{font-size:13px;color:var(--iw-gray);line-height:1.7;padding-left:14px}
    .page-header__updated{font-size:11px;color:#888;margin-top:6px;padding-left:14px}

    /* ===== メインレイアウト ===== */
    .main-wrap{max-width:980px;margin:0 auto;padding:0 12px}

    /* ===== カテゴリナビ ===== */
    .cat-nav{display:flex;gap:4px;flex-wrap:wrap;padding:12px 0 10px;border-bottom:1px solid var(--iw-border);margin-bottom:0}
    .cat-nav__btn{background:#fff;border:1px solid #b0bcd8;border-radius:3px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--iw-dark);transition:all .15s;white-space:nowrap;font-family:inherit}
    .cat-nav__btn:hover{border-color:var(--iw-blue);color:var(--iw-blue);background:var(--iw-blue-light)}
    .cat-nav__btn.active{background:var(--iw-navy);border-color:var(--iw-navy);color:#fff}

    /* ===== カテゴリセクション ===== */
    .category-section{margin:24px 0 0}
    .category-section__heading{font-size:15px;font-weight:bold;color:#fff;background:var(--iw-navy);padding:7px 14px;border-radius:3px 3px 0 0;display:flex;align-items:center;gap:8px}
    .category-section__heading::before{content:'';display:inline-block;width:3px;height:16px;background:rgba(255,255,255,.5);border-radius:2px}

    /* ===== サービス一覧テーブル ===== */
    .service-table{width:100%;border-collapse:collapse;border:1px solid var(--iw-border);border-top:none;margin-bottom:4px;background:#fff}
    .service-table th{background:#dce6f5;font-size:12px;color:var(--iw-gray);font-weight:normal;padding:6px 10px;text-align:left;border-bottom:1px solid var(--iw-border);border-right:1px solid var(--iw-border)}
    .service-table td{padding:10px 10px;border-bottom:1px solid var(--iw-border);border-right:1px solid var(--iw-border);vertical-align:middle}
    .service-table tr:last-child td{border-bottom:none}
    .service-table tr:hover td{background:var(--iw-blue-light)}
    .col-service{width:22%}.col-plans{width:60%}.col-action{width:18%}

    .service-name{font-weight:bold;font-size:14px;color:var(--iw-dark)}
    .service-provider{font-size:11px;color:#888;margin-top:2px}

    .price-row{display:flex;align-items:baseline;flex-wrap:wrap;gap:2px 12px;margin-bottom:2px}
    .price-label{color:var(--iw-gray);font-size:12px;min-width:0}
    .price-amount{font-weight:bold;font-size:14px;color:var(--iw-dark)}
    .price-amount.usd{color:#1a6e40}
    .price-unit{color:var(--iw-gray);font-size:11px}

    .badge-history{display:inline-block;font-size:10px;background:#fff8dc;border:1px solid #c8a000;color:#7a5c00;border-radius:2px;padding:1px 5px;margin-left:4px;vertical-align:middle;white-space:nowrap}

.btn-detail{display:inline-block;background:var(--iw-blue);color:#fff;text-decoration:none;font-size:12px;padding:5px 12px;border-radius:3px;border:none;cursor:pointer;transition:background .15s;font-family:inherit}
    .btn-detail:hover{background:var(--iw-navy)}

    /* ===== モーダル ===== */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;overflow-y:auto}
    .modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 12px}
    .modal{background:#fff;width:100%;max-width:720px;border-radius:4px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,64,.3);animation:slideIn .18s ease}
    @keyframes slideIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}

    .modal-header{background:var(--iw-navy);color:#fff;padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .modal-header__title{font-size:18px;font-weight:bold;line-height:1.3}
    .modal-header__sub{font-size:12px;opacity:.75;margin-top:3px}
    .modal-close{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:0 4px;opacity:.75;flex-shrink:0;line-height:1;font-family:inherit}
    .modal-close:hover{opacity:1}

    .modal-body{padding:20px}

    .modal-sec-title{font-size:13px;font-weight:bold;color:#fff;background:var(--iw-blue-mid);padding:5px 12px;margin:18px 0 12px;border-radius:2px}
    .modal-sec-title:first-child{margin-top:0}

    .modal-desc{font-size:13px;line-height:1.85;color:#333;margin-bottom:8px}
    .modal-url{font-size:12px;margin-top:6px}
    .modal-url a{color:var(--iw-link);text-decoration:none}
    .modal-url a:hover{text-decoration:underline;color:var(--iw-link-hover)}

    /* 価格履歴テーブル */
    .plan-block{margin-bottom:20px}
    .plan-name{font-size:13px;font-weight:bold;color:var(--iw-navy);padding:5px 10px;background:var(--iw-blue-light);border-left:3px solid var(--iw-navy);margin-bottom:6px}
    .plan-desc{font-size:12px;color:var(--iw-gray)}

    .history-table{width:100%;border-collapse:collapse;font-size:13px}
    .history-table th{background:#dce6f5;padding:6px 10px;text-align:left;font-weight:normal;font-size:12px;color:var(--iw-gray);border:1px solid var(--iw-border)}
    .history-table td{padding:8px 10px;border:1px solid var(--iw-border);vertical-align:middle}
    .history-table tr.current td{background:#fffbe6;font-weight:bold}

    .badge-current{display:inline-block;background:var(--iw-navy);color:#fff;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:5px;font-weight:normal;vertical-align:middle}
    .badge-up{display:inline-block;background:#fde8e8;border:1px solid #c44;color:#900;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:4px;font-weight:normal;vertical-align:middle}
    .badge-down{display:inline-block;background:#e8fde8;border:1px solid #4a4;color:#060;font-size:10px;border-radius:2px;padding:1px 5px;margin-left:4px;font-weight:normal;vertical-align:middle}
    .source-link{font-size:11px;color:#aaa}
    .source-link a{color:var(--iw-link);text-decoration:none}
    .source-link a:hover{text-decoration:underline}

    /* ===== フッター ===== */
    .site-footer{background:#1a1a2e;color:#aaa;text-align:center;font-size:11px;padding:20px 12px;margin-top:40px}
    .site-footer__note{margin-top:8px;font-size:11px;color:#666}

    /* ===== レスポンシブ ===== */
    @media(max-width:640px){
      .service-table .col-updated{display:none}
      .service-table .col-action{width:22%}
      .modal-overlay.open{padding:0;align-items:flex-end}
      .modal{border-radius:8px 8px 0 0;max-height:90vh;overflow-y:auto}
    }
  </style>
</head>

// ===== ユーティリティ =====
const categoryMap = Object.fromEntries(DB.categories.map(c=>[c.id,c.name]));

function getCurrentPrice(plan){
  return plan.price_history.find(p=>p.valid_to===null);
}

function fmtAmount(p){
  if(p.currency==='JPY') return p.amount.toLocaleString()+'円';
  return p.amount+' USドル（税別）';
}

function fmtBilling(b){
  return b==='monthly'?'/月':b==='annual'?'/年':'';
}

function fmtTax(p){
  if(p.currency==='USD') return '';
  return p.tax_included ? '' : '（税別）';
}

function hasHistoryEntry(plan){
  return plan.price_history.some(p=>p.valid_to!==null);
}

function fmtYM(str){
  if(!str) return '現在';
  const d=new Date(str);
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月';
}

// ===== カテゴリナビ =====
const catNav=document.getElementById('catNav');
[{id:'all',name:'すべて'},...DB.categories].forEach((cat,i)=>{
  const btn=document.createElement('button');
  btn.className='cat-nav__btn'+(i===0?' active':'');
  btn.textContent=cat.name;
  btn.dataset.cat=cat.id;
  catNav.appendChild(btn);
});
catNav.addEventListener('click',e=>{
  const btn=e.target.closest('.cat-nav__btn');
  if(!btn)return;
  document.querySelectorAll('.cat-nav__btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList(btn.dataset.cat);
});

// ===== 一覧レンダリング =====
function renderList(filterCat){
  const container=document.getElementById('serviceList');
  container.innerHTML='';
  const cats=filterCat==='all'?DB.categories:DB.categories.filter(c=>c.id===filterCat);

  cats.forEach(cat=>{
    const services=DB.services.filter(s=>s.category===cat.id);
    if(!services.length)return;

    const section=document.createElement('section');
    section.className='category-section';

    const heading=document.createElement('h2');
    heading.className='category-section__heading';
    heading.textContent=cat.name;
    section.appendChild(heading);

    const table=document.createElement('table');
    table.className='service-table';
    table.innerHTML=`<colgroup><col class="col-service"><col class="col-plans"><col class="col-action"></colgroup>
      <thead><tr>
        <th>サービス名</th><th>現在の価格</th><th></th>
      </tr></thead><tbody></tbody>`;

    const tbody=table.querySelector('tbody');
    services.forEach(svc=>{
      const tr=document.createElement('tr');

      // 価格セル
      const priceHtml=svc.plans.map(plan=>{
        const cur=getCurrentPrice(plan);
        if(!cur)return '';
        const isUSD=cur.currency==='USD';
        const taxNote=fmtTax(cur);
        return `<div class="price-row">
          <span class="price-label">${plan.name}</span>
          <span class="price-amount${isUSD?' usd':''}">${fmtAmount(cur)}${taxNote}</span>
          <span class="price-unit">${fmtBilling(cur.billing)}</span>
          ${hasHistoryEntry(plan)?'<span class="badge-history">改定履歴あり</span>':''}
        </div>`;
      }).join('');

      tr.innerHTML=`
        <td><div class="service-name">${svc.name}</div><div class="service-provider">${svc.provider}</div></td>
        <td>${priceHtml}</td>
        <td><button class="btn-detail" data-id="${svc.id}">詳細・推移 ›</button></td>`;
      tbody.appendChild(tr);
    });

    section.appendChild(table);
    container.appendChild(section);
  });
}

// ===== モーダル =====
const overlay=document.getElementById('modalOverlay');

document.getElementById('serviceList').addEventListener('click',e=>{
  const btn=e.target.closest('.btn-detail');
  if(btn) openModal(btn.dataset.id);
});
overlay.addEventListener('click',e=>{ if(e.target===overlay)closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

function openModal(id){
  const svc=DB.services.find(s=>s.id===id);
  if(!svc)return;

  let plansHtml='';
  svc.plans.forEach(plan=>{
    const sorted=[...plan.price_history].sort((a,b)=>new Date(b.valid_from)-new Date(a.valid_from));
    const rows=sorted.map((h,idx)=>{
      const isCur=h.valid_to===null;
      const period=isCur?`${fmtYM(h.valid_from)} 〜 現在`:`${fmtYM(h.valid_from)} 〜 ${fmtYM(h.valid_to)}`;
      const next=sorted[idx+1];
      let changeBadge='';
      if(next){
        if(h.amount>next.amount) changeBadge='<span class="badge-up">値上げ</span>';
        else if(h.amount<next.amount) changeBadge='<span class="badge-down">値下げ</span>';
      }
      const taxNote=fmtTax(h);
      const srcHtml=h.source?`<span class="source-link">（<a href="${h.source}" target="_blank" rel="noopener">出典</a>）</span>`:'';
      return `<tr class="${isCur?'current':''}">
        <td>${period}</td>
        <td>${fmtAmount(h)}${taxNote}${fmtBilling(h.billing)}${isCur?'<span class="badge-current">現在</span>':''}${changeBadge}</td>
        <td>${h.note||'—'} ${srcHtml}</td>
      </tr>`;
    }).join('');

    const nameDesc=plan.name+(plan.description?' — '+plan.description:'');
    plansHtml+=`<div class="plan-block">
      <div class="plan-name">${nameDesc}</div>
      <table class="history-table">
        <thead><tr>
          <th style="width:32%">適用期間</th>
          <th style="width:32%">価格</th>
          <th style="width:36%">備考</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  });

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header">
      <div>
        <div class="modal-header__title">${svc.name}</div>
        <div class="modal-header__sub">${svc.provider} &mdash; ${categoryMap[svc.category]||''}</div>
      </div>
      <button class="modal-close" id="modalCloseBtn" aria-label="閉じる">&times;</button>
    </div>
    <div class="modal-body">
      <p class="modal-sec-title">サービス概要</p>
      <p class="modal-desc">${svc.description}</p>
      <p class="modal-url">公式サイト：<a href="${svc.url}" target="_blank" rel="noopener">${svc.url_label} ↗</a></p>
      <p class="modal-sec-title">価格一覧・改定履歴</p>
      ${plansHtml}
    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('modalCloseBtn').addEventListener('click',closeModal);
}

function closeModal(){
  overlay.classList.remove('open');
  document.body.style.overflow='';
}

renderList('all');
</script>
